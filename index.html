<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赤色円形マーカー検出（OpenCV.js版）</title>
    <style>
        body {
            margin: 0;
            background-color: #111;
            font-family: sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            position: relative;
            width: 90%;
            max-width: 640px;
        }
        video {
            display: none;
        }
        canvas {
            width: 100%;
            height: auto;
            border: 2px solid #ff3b30;
            border-radius: 8px;
            display: block;
        }
        button {
            margin: 20px;
            padding: 15px 30px;
            font-size: 18px;
            background-color: #ff3b30;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        button:disabled {
            background-color: #555;
            cursor: not-allowed;
        }
        #status {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
            text-align: center;
        }
    </style>
    <script async src="https://docs.opencv.org/4.x/opencv.js" id="opencv-src"></script>
</head>
<body>

    <div id="status">OpenCV.jsを読み込んでいます（数秒かかります）...</div>
    
    <div class="container">
        <video id="camera-view" autoplay playsinline muted></video>
        <canvas id="canvas-output"></canvas>
    </div>

    <button id="start-btn" disabled>カメラ起動</button>

    <script>
        const video = document.getElementById('camera-view');
        const canvas = document.getElementById('canvas-output');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const statusText = document.getElementById('status');

        let src, dst, hsv, mask1, mask2, mask, contours, hierarchy;
        let isProcessing = false;

        // OpenCV.js の読み込み完了を待つ
        document.getElementById('opencv-src').addEventListener('load', () => {
            statusText.innerText = "準備完了！ボタンを押してテストを開始してください";
            startBtn.disabled = false;
        });

        startBtn.addEventListener('click', async () => {
            statusText.innerText = "カメラを起動中...";
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: false,
                    video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 480 } }
                });
                video.srcObject = stream;
                video.play();
                startBtn.style.display = 'none';
                
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    
                    // OpenCV用メモリ領域の確保
                    src = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC4);
                    dst = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC4);
                    hsv = new cv.Mat();
                    mask1 = new cv.Mat();
                    mask2 = new cv.Mat();
                    mask = new cv.Mat();
                    contours = new cv.MatVector();
                    hierarchy = new cv.Mat();

                    isProcessing = true;
                    statusText.innerText = "ターゲット（赤丸4つ）を映してください";
                    requestAnimationFrame(processVideo);
                };
            } catch (error) {
                statusText.innerText = "起動失敗: " + error.message;
            }
        });

        function processVideo() {
            if (!isProcessing) return;

            // 1. カメラ映像をCanvas経由でOpenCVに読み込み
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            src.data.set(ctx.getImageData(0, 0, canvas.width, canvas.height).data);

            // 2. 画質を滑らかにしてカメラのザラザラ（ノイズ）を消す
            cv.GaussianBlur(src, dst, new cv.Size(5, 5), 0, 0, cv.BORDER_DEFAULT);

            // 3. RGBからHSV色空間に変換（影や光の反射にめちゃくちゃ強くなる）
            cv.cvtColor(dst, hsv, cv.COLOR_RGBA2RGB);
            cv.cvtColor(hsv, hsv, cv.COLOR_RGB2HSV);

            // // 4. 赤色の範囲をピンポイント抽出（赤はHSVで両端に分かれるため2パターン合わせる）
            // // [色相(0-180), 彩度(0-255), 明度(0-255)]
            // let low1 = cv.matFromArray(3, 1, cv.CV_8U, [0, 70, 50]);
            // let high1 = cv.matFromArray(3, 1, cv.CV_8U, [10, 255, 255]);
            // let low2 = cv.matFromArray(3, 1, cv.CV_8U, [170, 70, 50]);
            // let high2 = cv.matFromArray(3, 1, cv.CV_8U, [180, 255, 255]);

            // 【黄緑（ライムグリーン）用に変更】
            // 色相(H)を 35〜85（緑系）に絞り、彩度(S)と明度(V)を高めにして鮮やかな色だけを指定
            let low = cv.matFromArray(3, 1, cv.CV_8U, [35, 80, 60]);
            let high = cv.matFromArray(3, 1, cv.CV_8U, [85, 255, 255]);
            
            cv.inRange(hsv, low, high, mask); // 直接 mask に抽出
            
            low.delete(); high.delete();

            cv.inRange(hsv, low1, high1, mask1);
            cv.inRange(hsv, low2, high2, mask2);
            cv.bitwise_or(mask1, mask2, mask); // 2つの赤色マスクを合体

            low1.delete(); high1.delete(); low2.delete(); high2.delete();

            // 5. 輪郭（塊）の抽出
            cv.findContours(mask, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

            let validCenters = [];

            // 6. 抽出した塊を1つずつ「本物の数学的円形度」で厳選
            for (let i = 0; i < contours.size(); ++i) {
                let cnt = contours.get(i);
                let area = cv.contourArea(cnt);
                let perimeter = cv.arcLength(cnt, true);

                // 小さすぎるゴミノイズは無視
                if (area > 50 && perimeter > 0) {
                    // 数学的円形度の計算式： 4 * π * 面積 / (周囲の長さの2乗)
                    // 完全な正円なら「1.0」になり、四角や複雑な形だと数値が下がる
                    let circularity = (4 * Math.PI * area) / (perimeter * perimeter);

                    // 円形度が 0.65 以上（かなり綺麗な円形）のものだけを許可
                    if (circularity > 0.65) {
                        // 塊の中心座標（重心）を計算
                        let M = cv.moments(cnt);
                        if (M.m00 !== 0) {
                            let cx = M.m10 / M.m00;
                            let cy = M.m01 / M.m00;
                            validCenters.push({ x: cx, y: cy });
                        }
                    }
                }
                cnt.delete();
            }

            // 7. 正確に円形の塊が「4つ」見つかった場合のみ四角く結ぶ
            if (validCenters.length === 4) {
                validCenters.sort((a, b) => a.y - b.y);
                let topTwo = [validCenters[0], validCenters[1]].sort((a, b) => a.x - b.x);
                let bottomTwo = [validCenters[2], validCenters[3]].sort((a, b) => a.x - b.x);
                const pts = [topTwo[0], topTwo[1], bottomTwo[1], bottomTwo[0]];

                // 緑色の枠線を描画
                ctx.strokeStyle = '#34c759';
                ctx.lineWidth = 5;
                ctx.beginPath();
                ctx.moveTo(pts[0].x, pts[0].y);
                ctx.lineTo(pts[1].x, pts[1].y);
                ctx.lineTo(pts[2].x, pts[2].y);
                ctx.lineTo(pts[3].x, pts[3].y);
                ctx.closePath();
                ctx.stroke();

                statusText.innerHTML = `<span style="color: #34c759;">🟢 ターゲットロック（OpenCV高精度検知）</span>`;
            } else {
                statusText.innerHTML = `🔴 検出された赤丸: ${validCenters.length} / 4`;
            }

            requestAnimationFrame(processVideo);
        }
    </script>
</body>
</html>
