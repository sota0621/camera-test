<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ステップ2：カメラ映像確認版</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            font-family: sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            position: relative;
            width: 90%;
            max-width: 640px;
        }
        /* 映像が見えない原因を探るため、一旦videoを画面に見えるようにします */
        video {
            width: 100%;
            height: auto;
            border: 2px solid #00ff00; /* ビデオの枠は緑 */
            display: block;
            margin-bottom: 10px;
        }
        canvas {
            width: 100%;
            height: auto;
            border: 2px solid #ff00ff; /* OpenCVの枠はピンク */
            display: block;
        }
        button {
            margin: 20px;
            padding: 15px 30px;
            font-size: 18px;
            background-color: #007aff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        #status {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 10px;
            text-align: center;
        }
    </style>
    <script async src="https://docs.opencv.org/4.x/opencv.js" onload="onOpenCvReady();" type="text/javascript"></script>
</head>
<body>

    <div id="status">OpenCV.jsを読み込んでいます...</div>
    
    <div class="container">
        <video id="camera-view" autoplay playsinline muted></video>
        <canvas id="canvas-output"></canvas>
    </div>

    <button id="start-btn" disabled>カメラを起動する</button>

    <script>
        const video = document.getElementById('camera-view');
        const canvas = document.getElementById('canvas-output');
        const startBtn = document.getElementById('start-btn');
        const statusText = document.getElementById('status');

        let src, dst, hsv, mask1, mask2, mask;
        let cap;
        let isProcessing = false;

        function onOpenCvReady() {
            statusText.innerText = "OpenCV.js の準備が完了しました！ボタンを押してください。";
            startBtn.disabled = false;
        }

        startBtn.addEventListener('click', async () => {
            statusText.innerText = "カメラにリクエスト中...";
            try {
                // スマホの背面カメラを最優先でリクエスト
                const constraints = {
                    audio: false,
                    video: {
                        facingMode: 'environment', 
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    }
                };
                
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                
                // スマホのSafari対策として、ビデオの属性を強制設定
                video.setAttribute('autoplay', '');
                video.setAttribute('muted', '');
                video.setAttribute('playsinline', '');
                video.srcObject = stream;
                
                startBtn.style.display = 'none';
                statusText.innerText = "映像の読み込みを待っています...";
                
                // 映像が実際に再生開始されたら実行
                video.onplaying = () => {
                    statusText.innerText = "映像再生開始。OpenCV初期化中...";
                    
                    const videoWidth = video.videoWidth || 640;
                    const videoHeight = video.videoHeight || 480;
                    
                    canvas.width = videoWidth;
                    canvas.height = videoHeight;
                    
                    src = new cv.Mat(videoHeight, videoWidth, cv.CV_8UC4);
                    dst = new cv.Mat(videoHeight, videoWidth, cv.CV_8UC4);
                    hsv = new cv.Mat();
                    mask1 = new cv.Mat();
                    mask2 = new cv.Mat();
                    mask = new cv.Mat();
                    cap = new cv.VideoCapture(video);
                    
                    isProcessing = true;
                    statusText.innerText = "検出スタート！赤いマークを映してください";
                    requestAnimationFrame(processVideo);
                };
                
                // 万が一再生が始まらない場合の強制トリガー
                setTimeout(() => {
                    if(!isProcessing) video.play();
                }, 1000);

            } catch (error) {
                console.error(error);
                statusText.innerText = "エラー: " + error.name;
                alert("カメラの起動に失敗。権限が許可されているか確認してください。: " + error.message);
            }
        });

        function processVideo() {
            if (!isProcessing) return;

            try {
                cap.read(src);
                src.copyTo(dst);

                cv.cvtColor(src, hsv, cv.COLOR_RGBA2RGB);
                cv.cvtColor(hsv, hsv, cv.COLOR_RGB2HSV);

                let low1 = new cv.Mat(hsv.rows, hsv.cols, hsv.type(), [0, 100, 50, 0]);
                let high1 = new cv.Mat(hsv.rows, hsv.cols, hsv.type(), [10, 255, 255, 0]);
                let low2 = new cv.Mat(hsv.rows, hsv.cols, hsv.type(), [170, 100, 50, 0]);
                let high2 = new cv.Mat(hsv.rows, hsv.cols, hsv.type(), [180, 255, 255, 0]);

                cv.inRange(hsv, low1, high1, mask1);
                cv.inRange(hsv, low2, high2, mask2);
                cv.bitwise_or(mask1, mask2, mask);

                low1.delete(); high1.delete(); low2.delete(); high2.delete();

                let contours = new cv.MatVector();
                let hierarchy = new cv.Mat();
                cv.findContours(mask, contours, hierarchy, cv.RETR_CCOMP, cv.CHAIN_APPROX_SIMPLE);

                let redCount = 0;

                for (let i = 0; i < contours.size(); ++i) {
                    let cnt = contours.get(i);
                    let area = cv.contourArea(cnt);

                    if (area > 150) {
                        redCount++;
                        let rect = cv.boundingRect(cnt);
                        let point1 = new cv.Point(rect.x, rect.y);
                        let point2 = new cv.Point(rect.x + rect.width, rect.y + rect.height);
                        cv.rectangle(dst, point1, point2, [0, 255, 0, 255], 3);
                    }
                    cnt.delete();
                }

                statusText.innerText = `検出された赤いマークの数: ${redCount} 個`;
                cv.imshow('canvas-output', dst);

                contours.delete();
                hierarchy.delete();

            } catch (err) {
                console.error(err);
            }

            requestAnimationFrame(processVideo);
        }
    </script>
</body>
</html>
