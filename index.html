<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黄緑色マーカー検出 ➔ カメラ切り替え機能付き</title>
    <style>
        body {
            margin: 0;
            background-color: #111;
            font-family: sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            position: relative;
            width: 90%;
            max-width: 640px;
        }
        video {
            display: none;
        }
        canvas {
            width: 100%;
            height: auto;
            border: 2px solid #555;
            border-radius: 8px;
            display: block;
            transition: border-color 0.3s;
        }
        canvas.locked {
            border-color: #34c759;
            box-shadow: 0 0 15px rgba(52, 199, 89, 0.5);
        }
        .btn {
            margin: 10px;
            padding: 15px 30px;
            font-size: 18px;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        #start-btn {
            background-color: #007aff;
        }
        #start-btn:disabled {
            background-color: #555;
            cursor: not-allowed;
        }
        #shoot-btn {
            background-color: #34c759;
            display: none;
            animation: pulse 1.5s infinite;
        }
        #shoot-btn:active {
            transform: scale(0.95);
        }
        /* 【新設】カメラ切り替えボタンのコンテナ */
        #camera-selector {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin: 10px;
            max-width: 90%;
        }
        .cam-toggle-btn {
            background-color: #444;
            color: #fff;
            border: 1px solid #666;
            padding: 8px 16px;
            margin: 5px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
        }
        .cam-toggle-btn.active {
            background-color: #30d158;
            border-color: #30d158;
            color: #000;
            font-weight: bold;
        }
        #status {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
            text-align: center;
            min-height: 24px;
        }
        #camera-trigger {
            display: none;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(52, 199, 89, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(52, 199, 89, 0); }
            100% { box-shadow: 0 0 0 0 rgba(52, 199, 89, 0); }
        }
    </style>
    <script async src="https://docs.opencv.org/4.x/opencv.js" id="opencv-src"></script>
</head>
<body>

    <div id="status">OpenCV.jsを読み込んでいます...</div>
    
    <div id="camera-selector"></div>

    <div class="container">
        <video id="camera-view" autoplay playsinline muted></video>
        <canvas id="canvas-output"></canvas>
    </div>

    <button id="start-btn" class="btn" disabled>システム開始</button>
    <button id="shoot-btn" class="btn">📸 撮影開始できます</button>

    <input type="file" id="camera-trigger" accept="image/*" capture="environment">

    <script>
        const video = document.getElementById('camera-view');
        const canvas = document.getElementById('canvas-output');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const shootBtn = document.getElementById('shoot-btn');
        const statusText = document.getElementById('status');
        const cameraTrigger = document.getElementById('camera-trigger');
        const cameraSelector = document.getElementById('camera-selector');

        let src, dst, hsv, mask, contours, hierarchy;
        let isProcessing = false;
        let currentStream = null;
        let videoDevices = []; // 認識したカメラのリスト
        
        let lockCounter = 0;
        const REQUIRED_FRAMES = 15;

        // OpenCV.js の読み込み完了を待つ
        document.getElementById('opencv-src').addEventListener('load', () => {
            statusText.innerText = "準備完了！ボタンを押してスキャンを開始してください";
            startBtn.disabled = false;
        });

        // システム開始ボタン
        startBtn.addEventListener('click', async () => {
            statusText.innerText = "カメラの一覧を取得中...";
            try {
                // 1. 最初に権限を取得（これがないとデバイスのIDや名前がブラウザから見えない）
                const initStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                initStream.getTracks().forEach(track => track.stop()); // 一旦止める

                // 2. 利用可能な全カメラを取得
                const devices = await navigator.mediaDevices.enumerateDevices();
                videoDevices = devices.filter(device => device.kind === 'videoinput');

                if (videoDevices.length === 0) {
                    throw new Error("有効なカメラが見つかりません。");
                }

                // 3. カメラ選択ボタンを生成
                createCameraButtons();

                // 4. 初期カメラ（0番）で起動
                startBtn.style.display = 'none';
                await bootCamera(0);

            } catch (error) {
                statusText.innerText = "起動失敗: " + error.message;
            }
        });

        // カメラ切り替えボタンを動的に作る関数
        function createCameraButtons() {
            cameraSelector.innerHTML = ''; // クリア
            videoDevices.forEach((device, index) => {
                const button = document.createElement('button');
                button.className = 'cam-toggle-btn';
                // iPhone等で名前が隠されている場合は「カメラ 0 (背面)」のように表示
                const label = device.label || `カメラ ${index}`;
                button.innerText = `📷 ${label}`;
                
                button.addEventListener('click', () => {
                    if (isProcessing) {
                        bootCamera(index);
                    }
                });
                cameraSelector.appendChild(button);
            });
        }

        // 指定されたインデックス（番号）のカメラを起動する関数
        async function bootCamera(index) {
            isProcessing = false; // ストリーム切り替え中は解析を止める
            shootBtn.style.display = 'none';
            canvas.classList.remove('locked');
            lockCounter = 0;

            // 稼働中のカメラがあればトラックをすべて完全に停止させる
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }

            statusText.innerText = `カメラ番号 [ ${index} ] を起動中...`;

            // ボタンの「アクティブ表示」を切り替え
            const buttons = cameraSelector.querySelectorAll('.cam-toggle-btn');
            buttons.forEach((btn, idx) => {
                if (idx === index) btn.classList.add('active');
                else btn.classList.remove('active');
            });

            try {
                // 選択された番号のデバイスIDを指定
                const constraints = {
                    audio: false,
                    video: {
                        deviceId: { exact: videoDevices[index].deviceId },
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    }
                };

                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                currentStream = stream;
                video.srcObject = stream;
                video.play();

                // カメラのメタデータが読み込まれたらOpenCVの準備（初回のみ領域確保）
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    
                    if (!src) {
                        src = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC4);
                        dst = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC4);
                        hsv = new cv.Mat();
                        mask = new cv.Mat();
                        contours = new cv.MatVector();
                        hierarchy = new cv.Mat();
                    }

                    isProcessing = true;
                    statusText.innerText = "黄緑の丸4つを画面内に収めてください";
                    requestAnimationFrame(processVideo);
                };

            } catch (error) {
                statusText.innerText = `カメラ [${index}] の起動に失敗: ` + error.message;
                isProcessing = true; // ループのフリーズを防ぐ
            }
        }

        // ユーザーが「撮影開始できます」ボタンを押した時
        shootBtn.addEventListener('click', () => {
            isProcessing = false; // カメラアプリ起動中は裏の解析を止める
            cameraTrigger.click(); // スマホの標準カメラを呼び出す
        });

        // ネイティブカメラでの撮影が完了してブラウザに戻ってきた時
        cameraTrigger.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                statusText.innerHTML = `<span style="color: #34c759;">🎉 写真の取り込みに成功しました！</span>`;
            }
            // スキャンループを再開
            lockCounter = 0;
            shootBtn.style.display = 'none';
            canvas.classList.remove('locked');
            isProcessing = true;
            requestAnimationFrame(processVideo);
        });

        function processVideo() {
            if (!isProcessing) return;

            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            src.data.set(ctx.getImageData(0, 0, canvas.width, canvas.height).data);

            cv.GaussianBlur(src, dst, new cv.Size(5, 5), 0, 0, cv.BORDER_DEFAULT);
            cv.cvtColor(dst, hsv, cv.COLOR_RGBA2RGB);
            cv.cvtColor(hsv, hsv, cv.COLOR_RGB2HSV);

            // 黄緑（ライムグリーン）の抽出
            let low = cv.matFromArray(3, 1, cv.CV_8U, [35, 80, 60]);
            let high = cv.matFromArray(3, 1, cv.CV_8U, [85, 255, 255]);
            cv.inRange(hsv, low, high, mask);
            low.delete(); high.delete();

            cv.findContours(mask, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

            let validCenters = [];

            for (let i = 0; i < contours.size(); ++i) {
                let cnt = contours.get(i);
                let area = cv.contourArea(cnt);
                let perimeter = cv.arcLength(cnt, true);

                if (area > 50 && perimeter > 0) {
                    let circularity = (4 * Math.PI * area) / (perimeter * perimeter);
                    // 広角レンズの歪みを考慮し、真円度の閾値を少し緩和（0.55）
                    if (circularity > 0.55) {
                        let M = cv.moments(cnt);
                        if (M.m00 !== 0) {
                            validCenters.push({ x: M.m10 / M.m00, y: M.m01 / M.m00 });
                        }
                    }
                }
                cnt.delete();
            }

            if (validCenters.length === 4) {
                lockCounter++;

                validCenters.sort((a, b) => a.y - b.y);
                let topTwo = [validCenters[0], validCenters[1]].sort((a, b) => a.x - b.x);
                let bottomTwo = [validCenters[2], validCenters[3]].sort((a, b) => a.x - b.x);
                const pts = [topTwo[0], topTwo[1], bottomTwo[1], bottomTwo[0]];

                ctx.strokeStyle = '#34c759';
                ctx.lineWidth = 5;
                ctx.beginPath();
                ctx.moveTo(pts[0].x, pts[0].y);
                ctx.lineTo(pts[1].x, pts[1].y);
                ctx.lineTo(pts[2].x, pts[2].y);
                ctx.lineTo(pts[3].x, pts[3].y);
                ctx.closePath();
                ctx.stroke();

                if (lockCounter >= REQUIRED_FRAMES) {
                    canvas.classList.add('locked');
                    shootBtn.style.display = 'block';
                    statusText.innerHTML = `<span style="color: #34c759;">🟢 領域をロックしました。撮影ボタンを押してください</span>`;
                } else {
                    statusText.innerHTML = `🟡 領域を確認中...`;
                }
            } else {
                lockCounter = 0;
                shootBtn.style.display = 'none';
                canvas.classList.remove('locked');
                statusText.innerHTML = `🔍 マーカーを探しています... (${validCenters.length} / 4)`;
            }

            requestAnimationFrame(processVideo);
        }
    </script>
</body>
</html>
