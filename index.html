<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ステップ2：赤色検知テスト</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            font-family: sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            position: relative;
            width: 100%;
            max-width: 640px;
        }
        /* カメラ映像は非表示にして、処理後のCanvasだけを画面に見せる */
        video {
            display: none;
        }
        canvas {
            width: 100%;
            height: auto;
            border: 2px solid #555;
        }
        button {
            margin: 20px;
            padding: 12px 24px;
            font-size: 16px;
            background-color: #007aff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        #status {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 10px;
        }
    </style>
    <script async src="https://docs.opencv.org/4.x/opencv.js" onload="onOpenCvReady();" type="text/javascript"></script>
</head>
<body>

    <div id="status">OpenCV.jsを読み込んでいます...</div>
    
    <div class="container">
        <video id="camera-view" autoplay playsinline muted></video>
        <canvas id="canvas-output"></canvas>
    </div>

    <button id="start-btn" disabled>カメラを起動する</button>

    <script>
        const video = document.getElementById('camera-view');
        const canvas = document.getElementById('canvas-output');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const statusText = document.getElementById('status');

        let src, dst, hsv, mask1, mask2, mask;
        let cap;
        let isProcessing = false;

        // OpenCV.js の読み込み完了コールバック
        function onOpenCvReady() {
            statusText.innerText = "OpenCV.js の準備が完了しました！";
            startBtn.disabled = false; // ボタンを押せるようにする
        }

        startBtn.addEventListener('click', async () => {
            try {
                const constraints = {
                    audio: false,
                    video: {
                        facingMode: { exact: 'environment' },
                        width: { ideal: 640 }, // 処理軽量化のため解像度を少し落とす
                        height: { ideal: 480 }
                    }
                };
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                startBtn.style.display = 'none';
                
                // ビデオの読み込み完了を待ってから解析スタート
                video.onloadedmetadata = () => {
                    video.play();
                    // Canvasのサイズをビデオに合わせる
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    initOpenCV();
                    isProcessing = true;
                    // ループ処理開始
                    requestAnimationFrame(processVideo);
                };
            } catch (error) {
                console.error(error);
                alert("背面カメラの起動に失敗しました。PCの場合はfacingModeを修正してください。");
                // PC用フォールバック
                const fallbackStream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
                video.srcObject = fallbackStream;
                video.onloadedmetadata = () => {
                    video.play();
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    initOpenCV();
                    isProcessing = true;
                    requestAnimationFrame(processVideo);
                    startBtn.style.display = 'none';
                };
            }
        });

        // OpenCVのメモリ領域（行列）を初期化
        function initOpenCV() {
            src = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC4);
            dst = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC4);
            hsv = new cv.Mat();
            mask1 = new cv.Mat();
            mask2 = new cv.Mat();
            mask = new cv.Mat();
            cap = new cv.VideoCapture(video);
        }

        // 毎フレーム実行される画像解析ループ
        function processVideo() {
            if (!isProcessing) return;

            try {
                // 1. 現在のビデオフレームを src に読み込む
                cap.read(src);
                src.copyTo(dst); // 描画用の下地としてコピー

                // 2. RGBからHSV（色相・彩度・明度）に変換（色検出がしやすくなるため）
                cv.cvtColor(src, hsv, cv.COLOR_RGBA2RGB);
                cv.cvtColor(hsv, hsv, cv.COLOR_RGB2HSV);

                // 3. 「赤色」の範囲を指定（赤はHSVで0付近と180付近に分かれるため2つ定義）
                // [色相(0-180), 彩度(0-255), 明度(0-255)]
                let low1 = new cv.Mat(hsv.rows, hsv.cols, hsv.type(), [0, 120, 70, 0]);
                let high1 = new cv.Mat(hsv.rows, hsv.cols, hsv.type(), [10, 255, 255, 0]);
                let low2 = new cv.Mat(hsv.rows, hsv.cols, hsv.type(), [170, 120, 70, 0]);
                let high2 = new cv.Mat(hsv.rows, hsv.cols, hsv.type(), [180, 255, 255, 0]);

                cv.inRange(hsv, low1, high1, mask1);
                cv.inRange(hsv, low2, high2, mask2);
                cv.bitwise_or(mask1, mask2, mask); // 2つの赤色マスクを結合

                // メモリ解放
                low1.delete(); high1.delete(); low2.delete(); high2.delete();

                // 4. 赤い部分の「輪郭（塊）」を見つける
                let contours = new cv.MatVector();
                let hierarchy = new cv.Mat();
                cv.findContours(mask, contours, hierarchy, cv.RETR_CCOMP, cv.CHAIN_APPROX_SIMPLE);

                let redCount = 0;

                // 5. 見つかった塊をループ処理
                for (let i = 0; i < contours.size(); ++i) {
                    let cnt = contours.get(i);
                    let area = cv.contourArea(cnt);

                    // 小さすぎるノイズ（ゴミ）は無視（シールの大きさに合わせて要調整）
                    if (area > 100) {
                        redCount++;
                        // 塊を囲む四角形（バウンディングボックス）を計算
                        let rect = cv.boundingRect(cnt);
                        
                        // 画面上の赤い塊に緑色の四角を描画
                        let point1 = new cv.Point(rect.x, rect.y);
                        let point2 = new cv.Point(rect.x + rect.width, rect.y + rect.height);
                        cv.rectangle(dst, point1, point2, [0, 255, 0, 255], 3);
                    }
                    cnt.delete();
                }

                // 状態を表示
                statusText.innerText = `検出された赤いマークの数: ${redCount} 個`;

                // 6. 処理後の映像をCanvasに表示
                cv.imshow('canvas-output', dst);

                // メモリ解放
                contours.delete();
                hierarchy.delete();

            } catch (err) {
                console.error(err);
            }

            // 次のフレームへ
            requestAnimationFrame(processVideo);
        }
    </script>
</body>
</html>
