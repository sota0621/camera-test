<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ステップ2：赤色検知（軽量ネイティブ版）</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            font-family: sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            position: relative;
            width: 90%;
            max-width: 640px;
        }
        video {
            display: none; /* 生ビデオは隠す */
        }
        canvas {
            width: 100%;
            height: auto;
            border: 2px solid #007aff;
            border-radius: 8px;
            display: block;
        }
        button {
            margin: 20px;
            padding: 15px 30px;
            font-size: 18px;
            background-color: #007aff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        #status {
            font-size: 16px;
            font-weight: bold;
            color: #aaa;
            margin-bottom: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="status">ボタンを押してカメラを起動してください</div>
    
    <div class="container">
        <video id="camera-view" autoplay playsinline muted></video>
        <canvas id="canvas-output"></canvas>
    </div>

    <button id="start-btn">カメラを起動する</button>

    <script>
        const video = document.getElementById('camera-view');
        const canvas = document.getElementById('canvas-output');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const startBtn = document.getElementById('start-btn');
        const statusText = document.getElementById('status');

        let isProcessing = false;

        startBtn.addEventListener('click', async () => {
            statusText.innerText = "カメラを起動中...";
            try {
                const constraints = {
                    audio: false,
                    video: {
                        facingMode: 'environment', 
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    }
                };
                
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                
                // iOS対策で念入りに再生をキック
                video.play();
                
                startBtn.style.display = 'none';
                
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    isProcessing = true;
                    statusText.innerText = "検出中... 赤いマークを映してください";
                    requestAnimationFrame(processVideo);
                };

            } catch (error) {
                console.error(error);
                statusText.innerText = "カメラ起動エラー: " + error.message;
            }
        });

        function processVideo() {
            if (!isProcessing) return;

            // 1. ビデオの現在のフレームをCanvasに描画
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // 2. 画面の全ピクセルデータを取得
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imgData.data;

            let redPixels = [];

            // 3. ピクセルを走査して「強い赤色」をピックアップ (4ピクセルおきに間引いて高速化)
            for (let i = 0; i < data.length; i += 16) {
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];

                // 赤成分が強く、緑と青が極端に低い部分（＝鮮やかな赤）を判定
                if (r > 140 && g < 70 && b < 70) {
                    const pixelIndex = i / 4;
                    const x = pixelIndex % canvas.width;
                    const y = Math.floor(pixelIndex / canvas.width);
                    redPixels.push({x, y});
                }
            }

            // 4. 近い赤色ピクセル同士をグループ化して「塊」にする簡易ロジック
            let clusters = [];
            redPixels.forEach(p => {
                let foundCluster = false;
                for (let c of clusters) {
                    // 既存の塊から50ピクセル以内なら同じ塊とみなす
                    if (Math.abs(c.x - p.x) < 50 && Math.abs(c.y - p.y) < 50) {
                        c.xs.push(p.x);
                        c.ys.push(p.y);
                        // 中心点を更新
                        c.x = (c.x + p.x) / 2;
                        c.y = (c.y + p.y) / 2;
                        foundCluster = true;
                        break;
                    }
                }
                if (!foundCluster) {
                    clusters.push({ x: p.x, y: p.y, xs: [p.x], ys: [p.y] });
                }
            });

            // 小さすぎる塊（ノイズ）を排除
            const validClusters = clusters.filter(c => c.xs.length > 5);

            // 5. 検出した塊に枠を描画
            validClusters.forEach(c => {
                const minX = Math.min(...c.xs);
                const maxX = Math.max(...c.xs);
                const minY = Math.min(...c.ys);
                const maxY = Math.max(...c.ys);
                
                ctx.strokeStyle = '#00ff00'; // 緑の枠線
                ctx.lineWidth = 4;
                ctx.strokeRect(minX - 5, minY - 5, (maxX - minX) + 10, (maxY - minY) + 10);
            });

            statusText.innerText = `検出された赤いマークの数: ${validClusters.length} 個`;

            // ループを継続
            requestAnimationFrame(processVideo);
        }
    </script>
</body>
</html>
