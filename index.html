<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ステップ4：カメラアプリ連携版</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            font-family: sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            width: 90%;
            max-width: 640px;
            text-align: center;
        }
        /* 撮影した動画のプレビュー画面 */
        video {
            width: 100%;
            height: auto;
            border: 2px solid #007aff;
            border-radius: 8px;
            display: none; /* 最初は隠しておく */
            margin-top: 15px;
        }
        /* 本物のカメラを呼び出すためのボタン（装飾） */
        .file-input-label {
            display: inline-block;
            padding: 20px 40px;
            font-size: 20px;
            font-weight: bold;
            background-color: #007aff;
            color: white;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            margin-top: 20px;
        }
        #camera-input {
            display: none; /* 本物のインプットは隠す */
        }
        #status {
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
            padding: 0 10px;
        }
        canvas {
            display: none; /* 裏側での画像解析用 */
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="status">下のボタンを押して、広角レンズ（0.5x）に切り替えて撮影してください</div>
        
        <label class="file-input-label" for="camera-input">📹 カメラを起動して録画</label>
        <input type="file" id="camera-input" accept="video/*" capture="environment">

        <video id="preview-video" controls playsinline></video>
        <canvas id="analysis-canvas"></canvas>
    </div>

    <script>
        const cameraInput = document.getElementById('camera-input');
        const video = document.getElementById('preview-video');
        const canvas = document.getElementById('analysis-canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const statusText = document.getElementById('status');

        // 音声を再生する関数
        function speakGuide(text) {
            const uttr = new SpeechSynthesisUtterance(text);
            uttr.lang = 'ja-JP';
            window.speechSynthesis.speak(uttr);
        }

        // カメラアプリでの撮影・録画が終わった瞬間に発火するイベント
        cameraInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            statusText.innerText = "動画を取り込み中... 解析しています...";
            
            // 撮影された動画をWebアプリに読み込む
            const fileURL = URL.createObjectURL(file);
            video.src = fileURL;
            video.style.display = 'block'; // プレビューを表示

            // 動画のデータが読み込まれたら解析開始
            video.onloadedmetadata = () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                
                // 動画の最初のほうのフレーム（0.5秒時点）に移動して解析
                video.currentTime = 0.5;
            };

            video.onseeked = () => {
                // 1フレームをキャプチャして画像解析にかける
                analyzeFrame();
            };
        });

        // 提出された動画に4つの緑のシールがあるかチェックするロジック
        function analyzeFrame() {
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imgData.data;
            
            let greenPixels = [];

            // 蛍光緑のピクセルを抽出
            for (let i = 0; i < data.length; i += 16) {
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];
                if (g > 140 && r < 100 && b < 100) {
                    const pixelIndex = i / 4;
                    const x = pixelIndex % canvas.width;
                    const y = Math.floor(pixelIndex / canvas.width);
                    greenPixels.push({x, y});
                }
            }

            // グループ化（塊にする）
            let clusters = [];
            greenPixels.forEach(p => {
                let foundCluster = false;
                for (let c of clusters) {
                    if (Math.abs(c.x - p.x) < 50 && Math.abs(c.y - p.y) < 50) {
                        c.xs.push(p.x); c.ys.push(p.y);
                        c.x = (c.x + p.x) / 2; c.y = (c.y + p.y) / 2;
                        foundCluster = true; break;
                    }
                }
                if (!foundCluster) clusters.push({ x: p.x, y: p.y, xs: [p.x], ys: [p.y] });
            });

            const validClusters = clusters.filter(c => c.xs.length > 5);
            const markCount = validClusters.length;

            // 判定と音声案内
            if (markCount === 4) {
                statusText.innerHTML = `<span style="color: #34c759;">成功！4つの点がすべて映っています。動画を保存しました。</span>`;
                speakGuide("チェック完了しました。正常に撮影できています。");
            } else {
                statusText.innerHTML = `<span style="color: #ff3b30;">エラー：マークが足りません (${markCount} / 4)</span>`;
                speakGuide("もっと引きで撮影してください。4つのマークが完全に映っていません。再撮影してください。");
            }
        }
    </script>
</body>
</html>
