<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArUcoマーカー4点検出（研究・ロボット標準）</title>
    <style>
        body {
            margin: 0;
            background-color: #111;
            font-family: sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            position: relative;
            width: 90%;
            max-width: 640px;
        }
        video {
            display: none;
        }
        canvas {
            width: 100%;
            height: auto;
            border: 2px solid #555;
            border-radius: 8px;
            display: block;
            transition: border-color 0.3s;
        }
        canvas.locked {
            border-color: #34c759;
            box-shadow: 0 0 15px rgba(52, 199, 89, 0.5);
        }
        .btn {
            margin: 20px;
            padding: 15px 30px;
            font-size: 18px;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        #start-btn {
            background-color: #007aff;
        }
        #start-btn:disabled {
            background-color: #555;
            cursor: not-allowed;
        }
        #shoot-btn {
            background-color: #34c759;
            display: none;
            animation: pulse 1.5s infinite;
        }
        #shoot-btn:active {
            transform: scale(0.95);
        }
        #status {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
            text-align: center;
            min-height: 24px;
        }
        #camera-trigger {
            display: none;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(52, 199, 89, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(52, 199, 89, 0); }
            100% { box-shadow: 0 0 0 0 rgba(52, 199, 89, 0); }
        }
    </style>
    <script async src="https://docs.opencv.org/4.x/opencv.js" id="opencv-src"></script>
</head>
<body>

    <div id="status">OpenCV.jsを読み込んでいます...</div>
    
    <div class="container">
        <video id="camera-view" autoplay playsinline muted></video>
        <canvas id="canvas-output"></canvas>
    </div>

    <button id="start-btn" class="btn" disabled>システム開始</button>
    <button id="shoot-btn" class="btn">📸 撮影開始できます</button>

    <input type="file" id="camera-trigger" accept="image/*" capture="environment">

    <script>
        const video = document.getElementById('camera-view');
        const canvas = document.getElementById('canvas-output');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const shootBtn = document.getElementById('shoot-btn');
        const statusText = document.getElementById('status');
        const cameraTrigger = document.getElementById('camera-trigger');

        let src, dst, dictionary, parameter, markerCorners, markerIds;
        let isProcessing = false;
        let lockCounter = 0;
        const REQUIRED_FRAMES = 10; 

        // 四隅のマーカー座標（IDごとに固定）
        // ID 0: 左上, ID 1: 右上, ID 2: 右下, ID 3: 左下
        let markerPositions = { 0: null, 1: null, 2: null, 3: null };

        document.getElementById('opencv-src').addEventListener('load', () => {
            statusText.innerText = "準備完了！ボタンを押してスキャンを開始してください";
            startBtn.disabled = false;
        });

        startBtn.addEventListener('click', async () => {
            statusText.innerText = "iPhoneの広角スキャン用カメラを探索中...";
            try {
                const initStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                initStream.getTracks().forEach(track => track.stop());

                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(device => device.kind === 'videoinput');

                let targetDeviceId = null;
                const wideDevice = videoDevices.find(d => {
                    const label = d.label.toLowerCase();
                    return label.includes('ultra') || label.includes('wide') || label.includes('0.5') || label.includes('超広角');
                });

                if (wideDevice) {
                    targetDeviceId = wideDevice.deviceId;
                } else if (videoDevices.length > 1) {
                    targetDeviceId = videoDevices[videoDevices.length - 1].deviceId;
                }

                // 軽量な解像度(1280x720)を設定
                const constraints = {
                    audio: false,
                    video: { width: { ideal: 1280 }, height: { ideal: 720 } }
                };

                if (targetDeviceId) {
                    constraints.video.deviceId = { exact: targetDeviceId };
                } else {
                    constraints.video.facingMode = 'environment';
                }

                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                
                const videoTrack = stream.getVideoTracks()[0];
                const capabilities = videoTrack.getCapabilities ? videoTrack.getCapabilities() : {};
                if (capabilities.zoom) {
                    try {
                        await videoTrack.applyConstraints({ advanced: [{ zoom: capabilities.zoom.min }] });
                    } catch (e) {}
                }

                video.srcObject = stream;
                video.play();
                startBtn.style.display = 'none';
                
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    
                    // OpenCVのArUco初期化
                    src = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC4);
                    dst = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC4);
                    
                    // 最も一般的でパターンの粗い「DICT_4X4_50」を使用（遠距離に最強）
                    dictionary = cv.getPredefinedDictionary(cv.DICT_4X4_50);
                    parameter = new cv.DetectorParameters();
                    markerCorners = new cv.MatVector();
                    markerIds = new cv.Mat();

                    isProcessing = true;
                    statusText.innerText = "4つのArUcoマーカー（ID: 0, 1, 2, 3）を配置してください";
                    requestAnimationFrame(processVideo);
                };
            } catch (error) {
                statusText.innerText = "カメラ起動失敗: " + error.message;
            }
        });

        shootBtn.addEventListener('click', () => {
            isProcessing = false; 
            cameraTrigger.click(); 
        });

        cameraTrigger.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                statusText.innerHTML = `<span style="color: #34c759;">🎉 写真の取り込みに成功しました！</span>`;
            }
            lockCounter = 0;
            shootBtn.style.display = 'none';
            canvas.classList.remove('locked');
            isProcessing = true;
            requestAnimationFrame(processVideo);
        });

        function processVideo() {
            if (!isProcessing) return;

            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            src.data.set(ctx.getImageData(0, 0, canvas.width, canvas.height).data);

            // RGBAからRGBへ変換してArUco検出にかける
            cv.cvtColor(src, dst, cv.COLOR_RGBA2RGB);
            cv.detectMarkers(dst, dictionary, markerCorners, markerIds, parameter);

            // 検出されたIDを解析
            if (markerIds.rows > 0) {
                for (let i = 0; i < markerIds.rows; ++i) {
                    let id = markerIds.data32S[i];
                    
                    // IDが0〜3の対象マーカーの場合
                    if (id >= 0 && id <= 3) {
                        // マーカーの4隅の座標から中心点を計算
                        let cornerMat = markerCorners.get(i);
                        let ptr = cornerMat.data32F; // [x0, y0, x1, y1, x2, y2, x3, y3]
                        
                        let centerX = (ptr[0] + ptr[2] + ptr[4] + ptr[6]) / 4;
                        let centerY = (ptr[1] + ptr[3] + ptr[5] + ptr[7]) / 4;
                        
                        markerPositions[id] = { x: centerX, y: centerY, timestamp: Date.now() };
                    }
                }
            }

            let activeCount = 0;
            const now = Date.now();
            const labels = { 0: "左上(ID:0)", 1: "右上(ID:1)", 2: "右下(ID:2)", 3: "左下(ID:3)" };

            for (let id = 0; id <= 3; id++) {
                let pos = markerPositions[id];
                // 1.5秒以内の検出履歴があれば有効
                if (pos && (now - pos.timestamp < 1500)) {
                    activeCount++;
                    
                    // 検出点表示
                    ctx.fillStyle = '#007aff';
                    ctx.beginPath();
                    ctx.arc(pos.x, pos.y, 8, 0, 2 * Math.PI);
                    ctx.fill();
                    
                    ctx.fillStyle = 'white';
                    ctx.font = 'bold 16px sans-serif';
                    ctx.fillText(labels[id], pos.x + 12, pos.y + 6);
                } else {
                    markerPositions[id] = null;
                }
            }

            // 4点（ID 0,1,2,3）がすべて揃った場合
            if (activeCount === 4) {
                lockCounter++;

                // 外枠線を描画 (0 -> 1 -> 2 -> 3 -> 0)
                ctx.strokeStyle = '#34c759';
                ctx.lineWidth = 5;
                ctx.beginPath();
                ctx.moveTo(markerPositions[0].x, markerPositions[0].y);
                ctx.lineTo(markerPositions[1].x, markerPositions[1].y);
                ctx.lineTo(markerPositions[2].x, markerPositions[2].y);
                ctx.lineTo(markerPositions[3].x, markerPositions[3].y);
                ctx.closePath();
                ctx.stroke();

                if (lockCounter >= REQUIRED_FRAMES) {
                    canvas.classList.add('locked');
                    shootBtn.style.display = 'block';
                    statusText.innerHTML = `<span style="color: #34c759;">🟢 すべてのマーカーをロックしました。撮影可能です</span>`;
                } else {
                    statusText.innerHTML = `🟡 領域を固定中...`;
                }
            } else {
                lockCounter = 0;
                shootBtn.style.display = 'none';
                canvas.classList.remove('locked');
                
                let missing = [];
                for (let id = 0; id <= 3; id++) {
                    if (!markerPositions[id]) missing.push(labels[id]);
                }
                statusText.innerHTML = `🔍 マーカー探索中... 不足: [ ${missing.join(', ')} ]`;
            }

            requestAnimationFrame(processVideo);
        }
    </script>
</body>
</html>
