<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赤色円形マーカー検出</title>
    <style>
        body {
            margin: 0;
            background-color: #111;
            font-family: sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            position: relative;
            width: 90%;
            max-width: 640px;
        }
        video {
            display: none;
        }
        canvas {
            width: 100%;
            height: auto;
            border: 2px solid #ff3b30;
            border-radius: 8px;
            display: block;
        }
        button {
            margin: 20px;
            padding: 15px 30px;
            font-size: 18px;
            background-color: #ff3b30;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        #status {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div id="status">ボタンを押してカメラを起動してください</div>
    
    <div class="container">
        <video id="camera-view" autoplay playsinline muted></video>
        <canvas id="canvas-output"></canvas>
    </div>

    <button id="start-btn">カメラ起動</button>

    <script>
        const video = document.getElementById('camera-view');
        const canvas = document.getElementById('canvas-output');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const startBtn = document.getElementById('start-btn');
        const statusText = document.getElementById('status');

        // 固定しきい値
        const MIN_R = 90;
        const RATIO = 1.15;

        startBtn.addEventListener('click', async () => {
            statusText.innerText = "カメラを起動中...";
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: false,
                    video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 480 } }
                });
                video.srcObject = stream;
                video.play();
                startBtn.style.display = 'none';
                
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    statusText.innerText = "円形の赤マーカーを4つ映してください";
                    requestAnimationFrame(processVideo);
                };
            } catch (error) {
                statusText.innerText = "起動失敗: " + error.message;
            }
        });

        function processVideo() {
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imgData.data;

            const redPixels = [];
            const distanceThreshold = Math.round(canvas.width * 0.08);

            // 1. 赤色ピクセルの抽出（高速化走査）
            for (let i = 0; i < data.length; i += 16) {
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];

                if (r > MIN_R && r > g * RATIO && r > b * RATIO) {
                    const pixelIndex = i / 4;
                    redPixels.push({
                        x: pixelIndex % canvas.width,
                        y: Math.floor(pixelIndex / canvas.width)
                    });
                }
            }

            // 2. クラスタリング（塊にグループ化）
            const clusters = [];
            redPixels.forEach(p => {
                let foundCluster = false;
                for (let c of clusters) {
                    if (Math.abs(c.x - p.x) < distanceThreshold && Math.abs(c.y - p.y) < distanceThreshold) {
                        c.xs.push(p.x); 
                        c.ys.push(p.y);
                        c.x = c.xs.reduce((sum, val) => sum + val, 0) / c.xs.length;
                        c.y = c.ys.reduce((sum, val) => sum + val, 0) / c.ys.length;
                        foundCluster = true; 
                        break;
                    }
                }
                if (!foundCluster) clusters.push({ x: p.x, y: p.y, xs: [p.x], ys: [p.y] });
            });

            // 3. 【新設】「円形度」によるフィルタリング
            const minPixelsPerMark = Math.round(canvas.width * 0.005);
            
            const circleClusters = clusters.filter(c => {
                // 最低限のピクセル数がないものは除外
                if (c.xs.length < minPixelsPerMark) return false;

                // 塊の外接矩形（幅と高さ）を計算
                const minX = Math.min(...c.xs);
                const maxX = Math.max(...c.xs);
                const minY = Math.min(...c.ys);
                const maxY = Math.max(...c.ys);
                
                const width = maxX - minX + 1;
                const height = maxY - minY + 1;

                // 指標①：縦横比（正円なら 1.0 に近くなる）
                const aspectRatio = width / height;
                if (aspectRatio < 0.85 || aspectRatio > 1.18) return false;

                // 指標②：充填率（外接四角形に対してピクセルがどれだけ詰まっているか）
                // 正円の理想値は π/4 ≒ 0.785 (78.5%)。サンプリング間引き(i+=16)を考慮し範囲を設定
                const boxArea = (width * height) / 4; // 4ピクセル飛ばし走査のため面積を1/4で補正
                const fillRatio = c.xs.length / boxArea;
                
                if (fillRatio < 0.60 || fillRatio > 0.88) return false;

                return true; // 縦横比・充填率ともにクリアしたものを「円」とみなす
            });
            
            // 4. 厳選された円形の塊が「4つ」ある場合のみ、四角い枠線を引く
            if (circleClusters.length === 4) {
                circleClusters.sort((a, b) => a.y - b.y);
                const topTwo = [circleClusters[0], circleClusters[1]].sort((a, b) => a.x - b.x);
                const bottomTwo = [circleClusters[2], circleClusters[3]].sort((a, b) => a.x - b.x);
                
                const pts = [topTwo[0], topTwo[1], bottomTwo[1], bottomTwo[0]];

                ctx.strokeStyle = '#34c759'; // ロック時は緑線に変更
                ctx.lineWidth = 5;
                ctx.beginPath();
                ctx.moveTo(pts[0].x, pts[0].y);
                ctx.lineTo(pts[1].x, pts[1].y);
                ctx.lineTo(pts[2].x, pts[2].y);
                ctx.lineTo(pts[3].x, pts[3].y);
                ctx.closePath();
                ctx.stroke();

                statusText.innerHTML = `<span style="color: #34c759;">🟢 円形マーカー4点認識完了</span>`;
            } else {
                statusText.innerHTML = `🔴 検出された円形の赤: ${circleClusters.length} / 4 (背景のノイズは無視しています)`;
            }

            requestAnimationFrame(processVideo);
        }
    </script>
</body>
</html>
