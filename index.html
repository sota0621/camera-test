<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黄緑色マーカー検出（0.5倍固定・録画対応）</title>
    <style>
        body {
            margin: 0;
            background-color: #111;
            font-family: sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            position: relative;
            width: 90%;
            max-width: 640px;
        }
        video {
            display: none;
        }
        canvas {
            width: 100%;
            height: auto;
            border: 2px solid #555;
            border-radius: 8px;
            display: block;
            transition: border-color 0.3s;
        }
        canvas.locked {
            border-color: #34c759;
            box-shadow: 0 0 15px rgba(52, 199, 89, 0.5);
        }
        .btn-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin: 20px;
        }
        .btn {
            padding: 15px 30px;
            font-size: 18px;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            width: 260px;
            text-align: center;
        }
        #start-btn {
            background-color: #007aff;
        }
        #start-btn:disabled {
            background-color: #555;
            cursor: not-allowed;
        }
        #shoot-btn {
            background-color: #34c759;
            display: none;
            animation: pulse 1.5s infinite;
        }
        #record-btn {
            background-color: #ff3b30; /* 赤色ボタン */
            display: none; /* カメラ起動後に出現 */
        }
        #record-btn.recording {
            background-color: #8e8e93; /* 録画中はグレーに変更 */
        }
        #status {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
            text-align: center;
            min-height: 24px;
        }
        #camera-trigger {
            display: none;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(52, 199, 89, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(52, 199, 89, 0); }
            100% { box-shadow: 0 0 0 0 rgba(52, 199, 89, 0); }
        }
    </style>
    <script async src="https://docs.opencv.org/4.x/opencv.js" id="opencv-src"></script>
</head>
<body>

    <div id="status">OpenCV.jsを読み込んでいます...</div>
    
    <div class="container">
        <video id="camera-view" autoplay playsinline muted></video>
        <canvas id="canvas-output"></canvas>
    </div>

    <div class="btn-container">
        <button id="start-btn" class="btn" disabled>システム開始</button>
        <button id="record-btn" class="btn">🔴 録画開始</button>
        <button id="shoot-btn" class="btn">📸 撮影開始できます</button>
    </div>

    <input type="file" id="camera-trigger" accept="image/*" capture="environment">

    <script>
        const video = document.getElementById('camera-view');
        const canvas = document.getElementById('canvas-output');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const shootBtn = document.getElementById('shoot-btn');
        const recordBtn = document.getElementById('record-btn');
        const statusText = document.getElementById('status');
        const cameraTrigger = document.getElementById('camera-trigger');

        let src, dst, hsv, mask, contours, hierarchy;
        let isProcessing = false;
        
        let lockCounter = 0;
        const REQUIRED_FRAMES = 15;

        // 録画用の変数
        let mediaRecorder;
        let recordedChunks = [];
        let isRecording = false;

        document.getElementById('opencv-src').addEventListener('load', () => {
            statusText.innerText = "準備完了！ボタンを押してスキャンを開始してください";
            startBtn.disabled = false;
        });

        startBtn.addEventListener('click', async () => {
            statusText.innerText = "広角スキャン用カメラを探索中...";
            try {
                const initStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                initStream.getTracks().forEach(track => track.stop());

                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(device => device.kind === 'videoinput');

                let targetDeviceId = null;
                const wideDevice = videoDevices.find(d => {
                    const label = d.label.toLowerCase();
                    return label.includes('ultra') || label.includes('wide') || label.includes('0.5') || label.includes('超広角');
                });

                if (wideDevice) {
                    targetDeviceId = wideDevice.deviceId;
                } else if (videoDevices.length > 1) {
                    targetDeviceId = videoDevices[videoDevices.length - 1].deviceId;
                }

                const constraints = {
                    audio: false,
                    video: {
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    }
                };

                if (targetDeviceId) {
                    constraints.video.deviceId = { exact: targetDeviceId };
                } else {
                    constraints.video.facingMode = 'environment';
                }

                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                
                // 【0.5倍固定】ストリーム開始直後に、ズームを最小値（超広角側）に即座に適用
                const videoTrack = stream.getVideoTracks()[0];
                const capabilities = videoTrack.getCapabilities ? videoTrack.getCapabilities() : {};
                
                if (capabilities.zoom) {
                    try {
                        await videoTrack.applyConstraints({
                            advanced: [{ zoom: capabilities.zoom.min }]
                        });
                        console.log("初期倍率を0.5倍（最小ズーム）に設定しました。");
                    } catch (e) {
                        console.warn("初期ズーム倍率の設定に失敗: ", e);
                    }
                }

                video.srcObject = stream;
                video.play();
                startBtn.style.display = 'none';
                recordBtn.style.display = 'block'; // 録画ボタンを表示できるようにする
                
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    
                    src = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC4);
                    dst = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC4);
                    hsv = new cv.Mat();
                    mask = new cv.Mat();
                    contours = new cv.MatVector();
                    hierarchy = new cv.Mat();

                    // 【録画初期化】Canvasの描画ストリーム（30fps）をキャプチャしてレコーダーを準備
                    const canvasStream = canvas.captureStream(30);
                    
                    // iPhone(iOS)のSafariで確実に動作するビデオコーデックを指定
                    let options = { mimeType: 'video/mp4; codecs=avc1' };
                    if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                        options = { mimeType: 'video/webm; codecs=vp9' };
                    }
                    if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                        options = { mimeType: '' }; // ブラウザデフォルト
                    }

                    mediaRecorder = new MediaRecorder(canvasStream, options);
                    
                    mediaRecorder.ondataavailable = (event) => {
                        if (event.data && event.data.size > 0) {
                            recordedChunks.push(event.data);
                        }
                    };

                    mediaRecorder.onstop = () => {
                        // 録画停止時に動画ファイルを生成して自動保存（ダウンロード）
                        const blob = new Blob(recordedChunks, { type: mediaRecorder.mimeType || 'video/mp4' });
                        recordedChunks = [];
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        // ファイル名に現在時刻を付与
                        const nowTime = new Date().toISOString().replace(/[:.]/g, '-');
                        a.download = `experiment-record-${nowTime}.mp4`;
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        URL.revokeObjectURL(url);
                        statusText.innerHTML = `<span style="color: #34c759;">🎬 動画ファイルを自動保存しました</span>`;
                    };

                    isProcessing = true;
                    statusText.innerText = "黄緑の丸4つを画面内に収めてください";
                    requestAnimationFrame(processVideo);
                };
            } catch (error) {
                statusText.innerText = "カメラ起動失敗: " + error.message;
            }
        });

        // 🟥 録画ボタンのクリックイベント
        recordBtn.addEventListener('click', () => {
            if (!isRecording) {
                // 録画開始
                recordedChunks = [];
                mediaRecorder.start();
                isRecording = true;
                recordBtn.innerText = "⏹ 録画停止";
                recordBtn.classList.add('recording');
            } else {
                // 録画停止
                mediaRecorder.stop();
                isRecording = false;
                recordBtn.innerText = "🔴 録画開始";
                recordBtn.classList.remove('recording');
            }
        });

        shootBtn.addEventListener('click', () => {
            isProcessing = false; 
            // 録画中の場合は一旦止める
            if (isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                recordBtn.innerText = "🔴 録画開始";
                recordBtn.classList.remove('recording');
            }
            cameraTrigger.click(); 
        });

        cameraTrigger.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                statusText.innerHTML = `<span style="color: #34c759;">🎉 写真の取り込みに成功しました！</span>`;
            }
            lockCounter = 0;
            shootBtn.style.display = 'none';
            canvas.classList.remove('locked');
            isProcessing = true;
            requestAnimationFrame(processVideo);
        });

        function processVideo() {
            if (!isProcessing) return;

            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            src.data.set(ctx.getImageData(0, 0, canvas.width, canvas.height).data);

            cv.GaussianBlur(src, dst, new cv.Size(5, 5), 0, 0, cv.BORDER_DEFAULT);
            cv.cvtColor(dst, hsv, cv.COLOR_RGBA2RGB);
            cv.cvtColor(hsv, hsv, cv.COLOR_RGB2HSV);

            let low = cv.matFromArray(3, 1, cv.CV_8U, [35, 60, 50]);
            let high = cv.matFromArray(3, 1, cv.CV_8U, [85, 255, 255]);
            cv.inRange(hsv, low, high, mask);
            low.delete(); high.delete();

            cv.findContours(mask, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

            let validCenters = [];

            for (let i = 0; i < contours.size(); ++i) {
                let cnt = contours.get(i);
                let area = cv.contourArea(cnt);

                if (area > 10) {
                    let perimeter = cv.arcLength(cnt, true);
                    if (perimeter > 0) {
                        let circularity = (4 * Math.PI * area) / (perimeter * perimeter);
                        if (circularity > 0.65) { 
                            let M = cv.moments(cnt);
                            if (M.m00 !== 0) {
                                validCenters.push({ x: M.m10 / M.m00, y: M.m01 / M.m00 });
                            }
                        }
                    }
                }
                cnt.delete();
            }

            if (validCenters.length === 4) {
                lockCounter++;

                validCenters.sort((a, b) => a.y - b.y);
                let topTwo = [validCenters[0], validCenters[1]].sort((a, b) => a.x - b.x);
                let bottomTwo = [validCenters[2], validCenters[3]].sort((a, b) => a.x - b.x);
                const pts = [topTwo[0], topTwo[1], bottomTwo[1], bottomTwo[0]];

                ctx.strokeStyle = '#34c759';
                ctx.lineWidth = 5;
                ctx.beginPath();
                ctx.moveTo(pts[0].x, pts[0].y);
                ctx.lineTo(pts[1].x, pts[1].y);
                ctx.lineTo(pts[2].x, pts[2].y);
                ctx.lineTo(pts[3].x, pts[3].y);
                ctx.closePath();
                ctx.stroke();

                if (lockCounter >= REQUIRED_FRAMES) {
                    canvas.classList.add('locked');
                    shootBtn.style.display = 'block';
                    if (!isRecording) {
                        statusText.innerHTML = `<span style="color: #34c759;">🟢 領域をロックしました。撮影または録画可能です</span>`;
                    }
                } else {
                    if (!isRecording) statusText.innerHTML = `🟡 領域を確認中...`;
                }
            } else {
                lockCounter = 0;
                shootBtn.style.display = 'none';
                canvas.classList.remove('locked');
                if (!isRecording) {
                    statusText.innerHTML = `🔍 マーカーを探しています... (${validCenters.length} / 4)`;
                }
                
                ctx.fillStyle = 'red';
                for(let p of validCenters) {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 5, 0, 2 * Math.PI);
                    ctx.fill();
                }
            }

            // 録画中の場合は画面左上に小さく「● REC」と録画中インジケータを上書き描画
            if (isRecording) {
                ctx.fillStyle = '#ff3b30';
                ctx.beginPath();
                ctx.arc(25, 25, 7, 0, 2 * Math.PI);
                ctx.fill();
                ctx.fillStyle = 'white';
                ctx.font = 'bold 16px sans-serif';
                ctx.fillText('REC', 40, 31);
                statusText.innerHTML = `<span style="color: #ff3b30;">🔴 実験映像を録画中です...</span>`;
            }

            requestAnimationFrame(processVideo);
        }
    </script>
</body>
</html>
