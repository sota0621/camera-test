<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>撮影領域・確定アプリ</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            font-family: sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            width: 90%;
            max-width: 640px;
            text-align: center;
        }
        video {
            width: 100%;
            height: auto;
            border: 2px solid #333;
            border-radius: 8px;
            display: none;
            margin-top: 15px;
        }
        .file-input-label {
            display: inline-block;
            padding: 20px 40px;
            font-size: 20px;
            font-weight: bold;
            background-color: #ff3b30;
            color: white;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 59, 48, 0.4);
            margin-top: 20px;
            transition: background 0.2s;
        }
        .file-input-label:active {
            background-color: #d63026;
        }
        #camera-input {
            display: none;
        }
        #status {
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
            padding: 0 10px;
            line-height: 1.4;
        }
        canvas {
            width: 100%;
            height: auto;
            border: 3px solid #555;
            border-radius: 12px;
            margin-top: 15px;
            display: none;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="status">📹 ボタンを押して、広角（0.5x）で4つの赤シールが映るように撮影してください</div>
        
        <label class="file-input-label" for="camera-input">📹 カメラを起動して録画</label>
        <input type="file" id="camera-input" accept="video/*" capture="environment">

        <canvas id="analysis-canvas"></canvas>
        <video id="preview-video" controls playsinline></video>
    </div>

    <script>
        const cameraInput = document.getElementById('camera-input');
        const video = document.getElementById('preview-video');
        const canvas = document.getElementById('analysis-canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const statusText = document.getElementById('status');

        function speakGuide(text) {
            const uttr = new SpeechSynthesisUtterance(text);
            uttr.lang = 'ja-JP';
            window.speechSynthesis.speak(uttr);
        }

        cameraInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            statusText.innerText = "動画を解析中...";
            
            const fileURL = URL.createObjectURL(file);
            video.src = fileURL;
            video.style.display = 'block';

            video.onloadedmetadata = () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.style.display = 'block';
                video.currentTime = 0.5; // 映像が安定する0.5秒後をキャプチャ
            };

            video.onseeked = () => {
                analyzeFrame();
            };
        });

        // 4つの点を時計回りに（左上、右上、右下、左下）並び替える関数
        function sortPoints(points) {
            if (points.length !== 4) return points;

            // Y座標でソートして上2つと下2つに分ける
            points.sort((a, b) => a.y - b.y);
            let topTwo = [points[0], points[1]];
            let bottomTwo = [points[2], points[3]];

            // X座標で左右を判定
            topTwo.sort((a, b) => a.x - b.x);
            let topLeft = topTwo[0];
            let topRight = topTwo[1];

            bottomTwo.sort((a, b) => a.x - b.x);
            let bottomLeft = bottomTwo[0];
            let bottomRight = bottomTwo[1];

            return [topLeft, topRight, bottomRight, bottomLeft];
        }

        function analyzeFrame() {
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imgData.data;
            
            let redPixels = [];
            const distanceThreshold = Math.round(canvas.width * 0.08); 

            // 赤色ピクセルの抽出
            for (let i = 0; i < data.length; i += 16) { 
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];

                // 赤みが強く、緑と青が低い（鮮やかな赤）
                if (r > 130 && r > g * 1.5 && r > b * 1.5) {
                    const pixelIndex = i / 4;
                    const x = pixelIndex % canvas.width;
                    const y = Math.floor(pixelIndex / canvas.width);
                    redPixels.push({x, y});
                }
            }

            // ピクセルをシールの「塊」にグループ化
            let clusters = [];
            redPixels.forEach(p => {
                let foundCluster = false;
                for (let c of clusters) {
                    if (Math.abs(c.x - p.x) < distanceThreshold && Math.abs(c.y - p.y) < distanceThreshold) {
                        c.xs.push(p.x); c.ys.push(p.y);
                        c.x = (c.x + p.x) / 2; c.y = (c.y + p.y) / 2;
                        foundCluster = true; break;
                    }
                }
                if (!foundCluster) clusters.push({ x: p.x, y: p.y, xs: [p.x], ys: [p.y] });
            });

            // 小さなノイズをカット
            const minPixelsPerMark = Math.round(canvas.width * 0.008);
            const validClusters = clusters.filter(c => c.xs.length > minPixelsPerMark);
            const markCount = validClusters.length;

            // 1. まず各マークの中心点を集める
            let markCenters = validClusters.map(c => ({ x: c.x, y: c.y }));

            // 2. もし4つの点がピッタリ見つかったら、並び替えて赤線で繋ぐ！
            if (markCount === 4) {
                const sortedPoints = sortPoints(markCenters);

                // あのイメージ画像のように太い赤い線で囲む
                ctx.strokeStyle = '#ff3b30'; // 鮮やかな赤
                ctx.lineWidth = Math.round(canvas.width * 0.008); // 解像度に応じた太い線
                ctx.lineJoin = 'round';
                
                ctx.beginPath();
                ctx.moveTo(sortedPoints[0].x, sortedPoints[0].y);
                ctx.lineTo(sortedPoints[1].x, sortedPoints[1].y);
                ctx.lineTo(sortedPoints[2].x, sortedPoints[2].y);
                ctx.lineTo(sortedPoints[3].x, sortedPoints[3].y);
                ctx.closePath(); // 最後と最初を繋ぐ
                ctx.stroke();

                // 各シールの位置に丸いマークも重ねて描画
                sortedPoints.forEach(p => {
                    ctx.fillStyle = '#ffffff';
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, Math.round(canvas.width * 0.015), 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#ff3b30';
                    ctx.lineWidth = Math.round(canvas.width * 0.004);
                    ctx.stroke();
                });

                statusText.innerHTML = `<span style="color: #34c759;">🔴 範囲確定 ｜ 録画成功！</span>`;
                speakGuide("チェック完了しました。正常に撮影できています。");

            } else {
                // 4つ未満、または5つ以上の場合は、見つかった場所だけ単体で緑の枠をつける（デバッグ用）
                validClusters.forEach(c => {
                    const minX = Math.min(...c.xs); const maxX = Math.max(...c.xs);
                    const minY = Math.min(...c.ys); const maxY = Math.max(...c.ys);
                    ctx.strokeStyle = '#00ff00';
                    ctx.lineWidth = Math.round(canvas.width * 0.005);
                    ctx.strokeRect(minX - 10, minY - 10, (maxX - minX) + 20, (maxY - minY) + 20);
                });

                statusText.innerHTML = `<span style="color: #ff3b30;">❌ エラー：マークが ${markCount} 個しか見つかりません</span>`;
                speakGuide("もっと引きで撮影してください。4つのマークが完全に映っていません。");
            }
        }
    </script>
</body>
</html>
