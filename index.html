<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黄緑色マーカー検出（長時間録画対応・ストリーミング保存版）</title>
    <style>
        body {
            margin: 0;
            background-color: #111;
            font-family: sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            position: relative;
            width: 90%;
            max-width: 720px;
        }
        video {
            display: none;
        }
        canvas {
            width: 100%;
            height: auto;
            border: 2px solid #555;
            border-radius: 8px;
            display: block;
            transition: border-color 0.3s;
        }
        canvas.locked {
            border-color: #34c759;
            box-shadow: 0 0 15px rgba(52, 199, 89, 0.5);
        }
        .btn-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin: 20px;
        }
        .btn {
            padding: 15px 30px;
            font-size: 18px;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            width: 280px;
            text-align: center;
        }
        #start-btn {
            background-color: #007aff;
        }
        #start-btn:disabled {
            background-color: #555;
            cursor: not-allowed;
        }
        #stop-record-btn {
            background-color: #ff3b30;
            display: none;
        }
        #status {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
            text-align: center;
            min-height: 24px;
            padding: 0 10px;
        }
    </style>
    <script async src="https://docs.opencv.org/4.x/opencv.js" id="opencv-src"></script>
</head>
<body>

    <div id="status">OpenCV.jsを読み込んでいます...</div>
    
    <div class="container">
        <video id="camera-view" autoplay playsinline muted></video>
        <canvas id="canvas-output"></canvas>
    </div>

    <div class="btn-container">
        <button id="start-btn" class="btn" disabled>システム開始 (保存先選択)</button>
        <button id="stop-record-btn" class="btn">⏹ 録画を停止して保存確定</button>
    </div>

    <script>
        const video = document.getElementById('camera-view');
        const canvas = document.getElementById('canvas-output');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const stopRecordBtn = document.getElementById('stop-record-btn');
        const statusText = document.getElementById('status');

        let src, dst, hsv, mask, contours, hierarchy;
        let isProcessing = false;
        
        let lockCounter = 0;
        const REQUIRED_FRAMES = 150; // 5秒間安定 (30fps換算)

        // 録画・ファイルストリーム用の変数
        let mediaRecorder;
        let isRecording = false;
        let fileHandle = null;
        let writableStream = null;

        document.getElementById('opencv-src').addEventListener('load', () => {
            // File System Access API のサポートチェック
            if ('showSaveFilePicker' in window) {
                statusText.innerText = "準備完了！ボタンを押して保存先の指定とスキャンを開始してください";
                startBtn.disabled = false;
            } else {
                statusText.innerHTML = '<span style="color: #ff3b30;">エラー: お使いのブラウザは直接保存APIに対応していません。PCのChromeまたはEdgeをご利用ください。</span>';
            }
        });

        startBtn.addEventListener('click', async () => {
            statusText.innerText = "動画の保存先を選択してください...";
            
            try {
                // 1. 最初にあらかじめユーザーに動画ファイルの保存先（ローカルストレージ）を選択させる
                const nowTime = new Date().toISOString().replace(/[:.]/g, '-');
                const optionsPicker = {
                    suggestedName: `experiment-video-${nowTime}.webm`,
                    types: [{
                        description: 'Video File',
                        accept: { 'video/webm': ['.webm'] },
                    }],
                };
                
                fileHandle = await window.showSaveFilePicker(optionsPicker);
                // 書き込みストリームをオープン
                writableStream = await fileHandle.createWritable();

                statusText.innerText = "広角スキャン用カメラを探索中...";

                const initStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                initStream.getTracks().forEach(track => track.stop());

                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(device => device.kind === 'videoinput');

                let targetDeviceId = null;
                const wideDevice = videoDevices.find(d => {
                    const label = d.label.toLowerCase();
                    return label.includes('ultra') || label.includes('wide') || label.includes('0.5') || label.includes('超広角');
                });

                if (wideDevice) {
                    targetDeviceId = wideDevice.deviceId;
                } else if (videoDevices.length > 1) {
                    targetDeviceId = videoDevices[videoDevices.length - 1].deviceId;
                }

                const constraints = {
                    audio: false,
                    video: {
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                };

                if (targetDeviceId) {
                    constraints.video.deviceId = { exact: targetDeviceId };
                } else {
                    constraints.video.facingMode = 'environment';
                }

                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                
                const videoTrack = stream.getVideoTracks()[0];
                const capabilities = videoTrack.getCapabilities ? videoTrack.getCapabilities() : {};
                
                if (capabilities.zoom) {
                    try {
                        await videoTrack.applyConstraints({
                            advanced: [{ zoom: capabilities.zoom.min }]
                        });
                    } catch (e) {
                        console.warn("ズーム倍率の設定に失敗: ", e);
                    }
                }

                video.srcObject = stream;
                video.play();
                startBtn.style.display = 'none';
                
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    
                    src = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC4);
                    dst = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC4);
                    hsv = new cv.Mat();
                    mask = new cv.Mat();
                    contours = new cv.MatVector();
                    hierarchy = new cv.Mat();

                    const canvasStream = canvas.captureStream(30);
                    
                    // ストリーミング書き込みと親和性の高い WebM (VP9/VP8) を優先
                    let options = { mimeType: 'video/webm; codecs=vp9' };
                    if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                        options = { mimeType: 'video/webm; codecs=vp8' };
                    }
                    if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                        options = { mimeType: '' }; 
                    }

                    // MediaRecorderインスタンスを作成
                    mediaRecorder = new MediaRecorder(canvasStream, options);
                    
                    // 【最重要】データが届くたびに、メモリに溜めず直接HDD/SSDのストリームへ書き込む
                    mediaRecorder.ondataavailable = async (event) => {
                        if (event.data && event.data.size > 0 && writableStream) {
                            try {
                                await writableStream.write(event.data);
                            } catch (err) {
                                console.error("ファイルへの書き込みエラー:", err);
                            }
                        }
                    };

                    mediaRecorder.onstop = async () => {
                        if (writableStream) {
                            // ファイルストリームを閉じて、ローカルのファイルへの保存を確定させる
                            await writableStream.close();
                            writableStream = null;
                        }
                        statusText.innerHTML = `<span style="color: #34c759;">🎬 映像をローカルストレージへリアルタイム直接保存しました</span>`;
                    };

                    isProcessing = true;
                    statusText.innerText = "黄緑の丸4つを画面内に収めてください";
                    requestAnimationFrame(processVideo);
                };
            } catch (error) {
                statusText.innerText = "起動失敗またはファイル選択キャンセル: " + error.message;
                if (writableStream) {
                    writableStream.close();
                    writableStream = null;
                }
            }
        });

        stopRecordBtn.addEventListener('click', () => {
            if (isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                stopRecordBtn.style.display = 'none';
                canvas.classList.remove('locked');
                lockCounter = 0; 
            }
        });

        function processVideo() {
            if (!isProcessing) return;

            // ベースとなるカメラ映像をキャンバスに描画
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // 録画中でない（＝カウント中や、探している最中）場合のみ、OpenCVでのマーカー解析と線・文字の描画を行う
            if (!isRecording) {
                src.data.set(ctx.getImageData(0, 0, canvas.width, canvas.height).data);

                cv.GaussianBlur(src, dst, new cv.Size(5, 5), 0, 0, cv.BORDER_DEFAULT);
                cv.cvtColor(dst, hsv, cv.COLOR_RGBA2RGB);
                cv.cvtColor(hsv, hsv, cv.COLOR_RGB2HSV);

                let low = cv.matFromArray(3, 1, cv.CV_8U, [35, 60, 50]);
                let high = cv.matFromArray(3, 1, cv.CV_8U, [85, 255, 255]);
                cv.inRange(hsv, low, high, mask);
                low.delete(); high.delete();

                cv.findContours(mask, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

                let validCenters = [];

                for (let i = 0; i < contours.size(); ++i) {
                    let cnt = contours.get(i);
                    let area = cv.contourArea(cnt);

                    if (area > 20) {
                        let perimeter = cv.arcLength(cnt, true);
                        if (perimeter > 0) {
                            let circularity = (4 * Math.PI * area) / (perimeter * perimeter);
                            if (circularity > 0.65) { 
                                let M = cv.moments(cnt);
                                if (M.m00 !== 0) {
                                    validCenters.push({ x: M.m10 / M.m00, y: M.m01 / M.m00 });
                                }
                            }
                        }
                    }
                    cnt.delete();
                }

                if (validCenters.length === 4) {
                    lockCounter++;

                    validCenters.sort((a, b) => a.y - b.y);
                    let topTwo = [validCenters[0], validCenters[1]].sort((a, b) => a.x - b.x);
                    let bottomTwo = [validCenters[2], validCenters[3]].sort((a, b) => a.x - b.x);
                    const pts = [topTwo[0], topTwo[1], bottomTwo[1], bottomTwo[0]];

                    // カウントダウン中のみ「緑色の四角枠」を描画
                    ctx.strokeStyle = '#34c759';
                    ctx.lineWidth = 5;
                    ctx.beginPath();
                    ctx.moveTo(pts[0].x, pts[0].y);
                    ctx.lineTo(pts[1].x, pts[1].y);
                    ctx.lineTo(pts[2].x, pts[2].y);
                    ctx.lineTo(pts[3].x, pts[3].y);
                    ctx.closePath();
                    ctx.stroke();

                    if (lockCounter >= REQUIRED_FRAMES) {
                        // ロックが確定した瞬間
                        canvas.classList.add('locked');

                        // 自動録画をスタート（引数に1000msを渡し、1秒ごとにondataavailableを発生させてストリームへ流す）
                        mediaRecorder.start(1000);
                        isRecording = true;
                        
                        // 録画停止ボタンを出現させる
                        stopRecordBtn.style.display = 'block';
                    } else {
                        // カウントダウンテキストを表示
                        let timeLeft = Math.ceil((REQUIRED_FRAMES - lockCounter) / 30);
                        statusText.innerHTML = `🟡 4点捕捉中... 画角安定まであと <span style="color: #ffcc00; font-size: 20px;">${timeLeft}</span> 秒`;
                    }
                } else {
                    lockCounter = 0;
                    canvas.classList.remove('locked');
                    statusText.innerHTML = `🔍 マーカーを探しています... (${validCenters.length} / 4)`;
                    
                    // カウントダウンしていない間だけ、捕捉できている点に「赤丸」を表示
                    ctx.fillStyle = 'red';
                    for(let p of validCenters) {
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, 5, 0, 2 * Math.PI);
                        ctx.fill();
                    }
                }
            } else {
                // 録画中 (isRecording === true)
                // キャンバスに上書きをしないことで、生映像を録画ストリームに流し続ける
                statusText.innerHTML = `<span style="color: #ff3b30;">🔴 画角が固定されました：ストレージへリアルタイム録画中...（数十分以上の撮影が可能）</span>`;
            }

            requestAnimationFrame(processVideo);
        }
    </script>
</body>
</html>
