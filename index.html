<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黄緑色マーカー検出 ➔ カメラ起動</title>
    <style>
        body {
            margin: 0;
            background-color: #111;
            font-family: sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            position: relative;
            width: 90%;
            max-width: 640px;
        }
        video {
            display: none;
        }
        canvas {
            width: 100%;
            height: auto;
            border: 2px solid #34c759;
            border-radius: 8px;
            display: block;
        }
        button {
            margin: 20px;
            padding: 15px 30px;
            font-size: 18px;
            background-color: #34c759;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        button:disabled {
            background-color: #555;
            cursor: not-allowed;
        }
        #status {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
            text-align: center;
        }
        /* カメラアプリ起動用の隠しインプット */
        #camera-trigger {
            display: none;
        }
    </style>
    <script async src="https://docs.opencv.org/4.x/opencv.js" id="opencv-src"></script>
</head>
<body>

    <div id="status">OpenCV.jsを読み込んでいます（数秒かかります）...</div>
    
    <div class="container">
        <video id="camera-view" autoplay playsinline muted></video>
        <canvas id="canvas-output"></canvas>
    </div>

    <button id="start-btn" disabled>システム開始</button>

    <input type="file" id="camera-trigger" accept="image/*" capture="environment">

    <script>
        const video = document.getElementById('camera-view');
        const canvas = document.getElementById('canvas-output');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const statusText = document.getElementById('status');
        const cameraTrigger = document.getElementById('camera-trigger');

        let src, dst, hsv, mask, contours, hierarchy;
        let isProcessing = false;
        
        // 安定検知用のカウンター（チラつきでの暴発を防ぐ）
        let lockCounter = 0;
        const REQUIRED_FRAMES = 30; // 4点検知が30フレーム（約1秒）継続したらカメラ起動

        // OpenCV.js の読み込み完了を待つ
        document.getElementById('opencv-src').addEventListener('load', () => {
            statusText.innerText = "準備完了！ボタンを押して開始してください";
            startBtn.disabled = false;
        });

        startBtn.addEventListener('click', async () => {
            statusText.innerText = "スキャン用カメラを起動中...";
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: false,
                    video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 480 } }
                });
                video.srcObject = stream;
                video.play();
                startBtn.style.display = 'none';
                
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    
                    src = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC4);
                    dst = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC4);
                    hsv = new cv.Mat();
                    mask = new cv.Mat();
                    contours = new cv.MatVector();
                    hierarchy = new cv.Mat();

                    isProcessing = true;
                    statusText.innerText = "黄緑の丸4つを枠内に収めてください";
                    requestAnimationFrame(processVideo);
                };
            } catch (error) {
                statusText.innerText = "起動失敗: " + error.message;
            }
        });

        // カメラアプリで撮影が完了したときのイベント（確認用）
        cameraTrigger.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                statusText.innerHTML = `<span style="color: #34c759;">📸 写真の撮影・取り込みが完了しました！</span>`;
                // 必要に応じて、ここで撮影された画像（e.target.files[0]）をサーバーに送るなどの処理ができます
            }
        });

        function processVideo() {
            if (!isProcessing) return;

            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            src.data.set(ctx.getImageData(0, 0, canvas.width, canvas.height).data);

            cv.GaussianBlur(src, dst, new cv.Size(5, 5), 0, 0, cv.BORDER_DEFAULT);
            cv.cvtColor(dst, hsv, cv.COLOR_RGBA2RGB);
            cv.cvtColor(hsv, hsv, cv.COLOR_RGB2HSV);

            // 鮮やかな黄緑（ライムグリーン）の抽出
            let low = cv.matFromArray(3, 1, cv.CV_8U, [35, 80, 60]);
            let high = cv.matFromArray(3, 1, cv.CV_8U, [85, 255, 255]);
            cv.inRange(hsv, low, high, mask);
            low.delete(); high.delete();

            cv.findContours(mask, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

            let validCenters = [];

            for (let i = 0; i < contours.size(); ++i) {
                let cnt = contours.get(i);
                let area = cv.contourArea(cnt);
                let perimeter = cv.arcLength(cnt, true);

                if (area > 50 && perimeter > 0) {
                    let circularity = (4 * Math.PI * area) / (perimeter * perimeter);
                    if (circularity > 0.65) {
                        let M = cv.moments(cnt);
                        if (M.m00 !== 0) {
                            validCenters.push({ x: M.m10 / M.m00, y: M.m01 / M.m00 });
                        }
                    }
                }
                cnt.delete();
            }

            // 4点検知の判定
            if (validCenters.length === 4) {
                lockCounter++; // 安定検知カウンターを進める

                validCenters.sort((a, b) => a.y - b.y);
                let topTwo = [validCenters[0], validCenters[1]].sort((a, b) => a.x - b.x);
                let bottomTwo = [validCenters[2], validCenters[3]].sort((a, b) => a.x - b.x);
                const pts = [topTwo[0], topTwo[1], bottomTwo[1], bottomTwo[0]];

                // 緑色の枠線を描画
                ctx.strokeStyle = '#34c759';
                ctx.lineWidth = 5;
                ctx.beginPath();
                ctx.moveTo(pts[0].x, pts[0].y);
                ctx.lineTo(pts[1].x, pts[1].y);
                ctx.lineTo(pts[2].x, pts[2].y);
                ctx.lineTo(pts[3].x, pts[3].y);
                ctx.closePath();
                ctx.stroke();

                // カウント状況をプログレス風に表示
                let progress = Math.min(100, Math.round((lockCounter / REQUIRED_FRAMES) * 100));
                statusText.innerHTML = `<span style="color: #34c759;">🟢 領域確認中... (${progress}%)</span>`;

                // 指定フレームの間、安定して領域が確認できたらトリガー発火
                if (lockCounter >= REQUIRED_FRAMES) {
                    isProcessing = false; // 高速連打・多重起動を防ぐため一旦画像解析をストップ
                    statusText.innerHTML = `<span style="color: #34c759;">🟢 領域確定！カメラを起動します...</span>`;
                    
                    // スマホのネイティブカメラを自動クリックで起動
                    setTimeout(() => {
                        cameraTrigger.click();
                        // カメラアプリが閉じられたら再度検知に戻れるようにカウンターをリセット
                        lockCounter = 0;
                        isProcessing = true;
                        requestAnimationFrame(processVideo);
                    }, 500); 
                    return;
                }
            } else {
                // 4点揃わなくなったらカウンターをゼロにリセット（厳格化）
                lockCounter = 0;
                statusText.innerHTML = `🔴 マーカーをスキャン中... (検出数: ${validCenters.length} / 4)`;
            }

            requestAnimationFrame(processVideo);
        }
    </script>
</body>
</html>
