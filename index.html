<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黄緑色マーカー検出 ➔ ボタン押して撮影 (高画質版)</title>
    <style>
        body {
            margin: 0;
            background-color: #111;
            font-family: sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            position: relative;
            width: 90%;
            max-width: 640px;
        }
        video {
            display: none;
        }
        canvas {
            width: 100%;
            height: auto;
            border: 2px solid #555;
            border-radius: 8px;
            display: block;
            transition: border-color 0.3s;
        }
        canvas.locked {
            border-color: #34c759;
            box-shadow: 0 0 15px rgba(52, 199, 89, 0.5);
        }
        .btn {
            margin: 20px;
            padding: 15px 30px;
            font-size: 18px;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        #start-btn {
            background-color: #007aff;
        }
        #start-btn:disabled {
            background-color: #555;
            cursor: not-allowed;
        }
        #shoot-btn {
            background-color: #34c759;
            display: none;
            animation: pulse 1.5s infinite;
        }
        #shoot-btn:active {
            transform: scale(0.95);
        }
        #status {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
            text-align: center;
            min-height: 24px;
        }
        #camera-trigger {
            display: none;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(52, 199, 89, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(52, 199, 89, 0); }
            100% { box-shadow: 0 0 0 0 rgba(52, 199, 89, 0); }
        }
    </style>
    <script async src="https://docs.opencv.org/4.x/opencv.js" id="opencv-src"></script>
</head>
<body>

    <div id="status">OpenCV.jsを読み込んでいます...</div>
    
    <div class="container">
        <video id="camera-view" autoplay playsinline muted></video>
        <canvas id="canvas-output"></canvas>
    </div>

    <button id="start-btn" class="btn" disabled>システム開始</button>
    <button id="shoot-btn" class="btn">📸 撮影開始できます</button>

    <input type="file" id="camera-trigger" accept="image/*" capture="environment">

    <script>
        const video = document.getElementById('camera-view');
        const canvas = document.getElementById('canvas-output');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const shootBtn = document.getElementById('shoot-btn');
        const statusText = document.getElementById('status');
        const cameraTrigger = document.getElementById('camera-trigger');

        // OpenCV解析用の隠しキャンバス（負荷軽減のため一回り小さいサイズで処理）
        const processCanvas = document.createElement('canvas');
        const pCtx = processCanvas.getContext('2d');
        const PROCESS_WIDTH = 640;
        const PROCESS_HEIGHT = 480;

        let src, dst, hsv, mask, contours, hierarchy;
        let isProcessing = false;
        
        let lockCounter = 0;
        const REQUIRED_FRAMES = 15;

        document.getElementById('opencv-src').addEventListener('load', () => {
            statusText.innerText = "準備完了！ボタンを押してスキャンを開始してください";
            startBtn.disabled = false;
        });

        startBtn.addEventListener('click', async () => {
            statusText.innerText = "広角スキャン用カメラを探索中...";
            try {
                const initStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                initStream.getTracks().forEach(track => track.stop());

                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(device => device.kind === 'videoinput');

                let targetDeviceId = null;

                const wideDevice = videoDevices.find(d => {
                    const label = d.label.toLowerCase();
                    return label.includes('ultra') || label.includes('wide') || label.includes('0.5') || label.includes('超広角');
                });

                if (wideDevice) {
                    targetDeviceId = wideDevice.deviceId;
                    console.log("広角レンズを検出しました: " + wideDevice.label);
                } else if (videoDevices.length > 1) {
                    targetDeviceId = videoDevices[videoDevices.length - 1].deviceId;
                    console.log("カメラ名から判別不能なため、末尾のカメラIDを適用します。");
                }

                // 【強化ポイント】解像度をkitchen.htmlと同様の フルHD (1920x1080) に設定
                const constraints = {
                    audio: false,
                    video: {
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    }
                };

                if (targetDeviceId) {
                    constraints.video.deviceId = { exact: targetDeviceId };
                } else {
                    constraints.video.facingMode = 'environment';
                }

                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                
                const videoTrack = stream.getVideoTracks()[0];
                const capabilities = videoTrack.getCapabilities ? videoTrack.getCapabilities() : {};
                
                if (capabilities.zoom) {
                    try {
                        await videoTrack.applyConstraints({
                            advanced: [{ zoom: capabilities.zoom.min }]
                        });
                        console.log("ズーム倍率を最小に設定しました: " + capabilities.zoom.min);
                    } catch (e) {
                        console.warn("ズーム倍率の設定に失敗しました: ", e);
                    }
                }

                video.srcObject = stream;
                video.play();
                startBtn.style.display = 'none';
                
                video.onloadedmetadata = () => {
                    // 表示用キャンバスは高解像度（カメラの生のサイズ）に合わせる
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    
                    // 解析用キャンバスのサイズを設定（640x480に固定して軽量化）
                    processCanvas.width = PROCESS_WIDTH;
                    processCanvas.height = PROCESS_HEIGHT;
                    
                    // OpenCVのメモリ確保も解析用サイズ（640x480）で行う
                    src = new cv.Mat(PROCESS_HEIGHT, PROCESS_WIDTH, cv.CV_8UC4);
                    dst = new cv.Mat(PROCESS_HEIGHT, PROCESS_WIDTH, cv.CV_8UC4);
                    hsv = new cv.Mat();
                    mask = new cv.Mat();
                    contours = new cv.MatVector();
                    hierarchy = new cv.Mat();

                    isProcessing = true;
                    statusText.innerText = "黄緑の丸4つを画面内に収めてください（高画質・広角モード）";
                    requestAnimationFrame(processVideo);
                };
            } catch (error) {
                statusText.innerText = "カメラ起動失敗: " + error.message + " (通常の背面カメラで再試行します)";
                try {
                    // フォールバック側も高解像度化
                    const fallbackStream = await navigator.mediaDevices.getUserMedia({
                        audio: false,
                        video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } }
                    });
                    video.srcObject = fallbackStream;
                    video.play();
                    startBtn.style.display = 'none';
                    isProcessing = true;
                    requestAnimationFrame(processVideo);
                } catch (fallbackError) {
                    statusText.innerText = "完全な起動失敗: " + fallbackError.message;
                }
            }
        });

        shootBtn.addEventListener('click', () => {
            isProcessing = false;
            cameraTrigger.click();
        });

        cameraTrigger.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                statusText.innerHTML = `<span style="color: #34c759;">🎉 写真の取り込みに成功しました！</span>`;
            }
            lockCounter = 0;
            shootBtn.style.display = 'none';
            canvas.classList.remove('locked');
            isProcessing = true;
            requestAnimationFrame(processVideo);
        });

        function processVideo() {
            if (!isProcessing) return;

            // 1. 画面表示用の大キャンバスに描画（ユーザーが見る綺麗な映像）
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // 2. 内部解析用の小キャンバスに縮小描画（OpenCVの処理を速くするため）
            pCtx.drawImage(video, 0, 0, PROCESS_WIDTH, PROCESS_HEIGHT);
            src.data.set(pCtx.getImageData(0, 0, PROCESS_WIDTH, PROCESS_HEIGHT).data);

            cv.GaussianBlur(src, dst, new cv.Size(5, 5), 0, 0, cv.BORDER_DEFAULT);
            cv.cvtColor(dst, hsv, cv.COLOR_RGBA2RGB);
            cv.cvtColor(hsv, hsv, cv.COLOR_RGB2HSV);

            let low = cv.matFromArray(3, 1, cv.CV_8U, [35, 80, 60]);
            let high = cv.matFromArray(3, 1, cv.CV_8U, [85, 255, 255]);
            cv.inRange(hsv, low, high, mask);
            low.delete(); high.delete();

            cv.findContours(mask, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

            let validCenters = [];

            for (let i = 0; i < contours.size(); ++i) {
                let cnt = contours.get(i);
                let area = cv.contourArea(cnt);
                let perimeter = cv.arcLength(cnt, true);

                if (area > 50 && perimeter > 0) {
                    let circularity = (4 * Math.PI * area) / (perimeter * perimeter);
                    if (circularity > 0.55) { 
                        let M = cv.moments(cnt);
                        if (M.m00 !== 0) {
                            validCenters.push({ x: M.m10 / M.m00, y: M.m01 / M.m00 });
                        }
                    }
                }
                cnt.delete();
            }

            if (validCenters.length === 4) {
                lockCounter++;

                validCenters.sort((a, b) => a.y - b.y);
                let topTwo = [validCenters[0], validCenters[1]].sort((a, b) => a.x - b.x);
                let bottomTwo = [validCenters[2], validCenters[3]].sort((a, b) => a.x - b.x);
                const pts = [topTwo[0], topTwo[1], bottomTwo[1], bottomTwo[0]];

                // 【強化ポイント】
                // 640x480内で検出した座標を、実際のフルHD表示用キャンバスの比率に拡大変換して枠線を引く
                const scaleX = canvas.width / PROCESS_WIDTH;
                const scaleY = canvas.height / PROCESS_HEIGHT;

                ctx.strokeStyle = '#34c759';
                ctx.lineWidth = 6; // 大画面に合わせて少し線を太く
                ctx.beginPath();
                ctx.moveTo(pts[0].x * scaleX, pts[0].y * scaleY);
                ctx.lineTo(pts[1].x * scaleX, pts[1].y * scaleY);
                ctx.lineTo(pts[2].x * scaleX, pts[2].y * scaleY);
                ctx.lineTo(pts[3].x * scaleX, pts[3].y * scaleY);
                ctx.closePath();
                ctx.stroke();

                if (lockCounter >= REQUIRED_FRAMES) {
                    canvas.classList.add('locked');
                    shootBtn.style.display = 'block';
                    statusText.innerHTML = `<span style="color: #34c759;">🟢 領域をロックしました。撮影ボタンを押してください</span>`;
                } else {
                    statusText.innerHTML = `🟡 領域を確認中...`;
                }
            } else {
                lockCounter = 0;
                shootBtn.style.display = 'none';
                canvas.classList.remove('locked');
                statusText.innerHTML = `🔍 マーカーを探しています... (${validCenters.length} / 4)`;
            }

            requestAnimationFrame(processVideo);
        }
    </script>
</body>
</html>
