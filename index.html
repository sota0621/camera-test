<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ステップ4：広角・ズーム機能対応</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            font-family: sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            position: relative;
            width: 90%;
            max-width: 640px;
        }
        video {
            display: none;
        }
        canvas {
            width: 100%;
            height: auto;
            border: 2px solid #007aff;
            border-radius: 8px;
            display: block;
        }
        /* コントロールUI */
        .controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            justify-content: center;
            width: 100%;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        #start-btn { background-color: #34c759; padding: 15px 30px; font-size: 18px; }
        .zoom-btn { background-color: #555; display: none; } /* カメラ起動後に表示 */
        
        #status {
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 10px;
            text-align: center;
        }
        #zoom-info {
            font-size: 12px;
            color: #aaa;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div id="status">ボタンを押してカメラを起動してください</div>
    
    <div class="container">
        <video id="camera-view" autoplay playsinline muted></video>
        <canvas id="canvas-output"></canvas>
    </div>

    <button id="start-btn">カメラ起動 ＆ 音声ON</button>

    <div class="controls">
        <button id="zoom-out-btn" class="zoom-btn">❌ ズームアウト (広角)</button>
        <button id="zoom-in-btn" class="zoom-btn">🔍 ズームイン</button>
    </div>
    <div id="zoom-info"></div>

    <script>
        const video = document.getElementById('camera-view');
        const canvas = document.getElementById('canvas-output');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const startBtn = document.getElementById('start-btn');
        const zoomInBtn = document.getElementById('zoom-in-btn');
        const zoomOutBtn = document.getElementById('zoom-out-btn');
        const statusText = document.getElementById('status');
        const zoomInfo = document.getElementById('zoom-info');

        let isProcessing = false;
        let lastSpokenTime = 0;
        let videoTrack = null; // カメラのコントロール用トラック
        let zoomCapabilities = null; // ズームの上限・下限データ
        let currentZoom = 1.0;

        startBtn.addEventListener('click', async () => {
            statusText.innerText = "カメラを起動中...";
            try {
                const uttr = new SpeechSynthesisUtterance("");
                window.speechSynthesis.speak(uttr);

                // 【広角対応のポイント】
                // Androidや一部のブラウザでは、高度なカメラスイッチ（zoomなど）を効かせるために
                // 背面カメラ(environment)を詳細なパラメータでリクエストします
                const constraints = {
                    audio: false,
                    video: {
                        facingMode: 'environment', 
                        width: { ideal: 640 },
                        height: { ideal: 480 },
                        // 高度な制御（ズーム）を許可する設定
                        advanced: [{ zoom: 1 }] 
                    }
                };
                
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                video.play();
                
                startBtn.style.display = 'none';
                
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    
                    // カメラのコントロール権限（トラック）を取得
                    videoTrack = stream.getVideoTracks()[0];
                    
                    // ズーム機能に対応しているかチェック
                    setupZoomControls();

                    isProcessing = true;
                    statusText.innerText = "蛍光緑のシールを4つ画面に映してください";
                    requestAnimationFrame(processVideo);
                };

            } catch (error) {
                console.error(error);
                statusText.innerText = "カメラ起動エラー: " + error.message;
            }
        });

        // ズーム機能の初期設定
        function setupZoomControls() {
            if (!videoTrack || typeof videoTrack.getCapabilities !== 'function') {
                zoomInfo.innerText = "お使いのブラウザ・機種はWebからのズーム制御に未対応です（標準画角で動作します）";
                return;
            }

            const capabilities = videoTrack.getCapabilities();
            
            // ズーム機能（zoom）があるか確認
            if (capabilities.zoom) {
                zoomCapabilities = capabilities.zoom;
                currentZoom = zoomCapabilities.min; // 最初は一番引き（広角：最小値）にする
                
                // カメラに一番引き（広角）の値を設定
                applyZoom(currentZoom);

                // ボタンを表示する
                zoomInBtn.style.display = 'inline-block';
                zoomOutBtn.style.display = 'inline-block';
                updateZoomUI();
            } else {
                zoomInfo.innerText = "背面カメラのズーム機能が検出できませんでした。";
            }
        }

        // 実際にカメラの倍率を変更する関数
        function applyZoom(value) {
            if (videoTrack && zoomCapabilities) {
                // 安全のため、取得した最小値〜最大値の範囲内に収める
                const safeValue = Math.max(zoomCapabilities.min, Math.min(zoomCapabilities.max, value));
                currentZoom = safeValue;
                
                videoTrack.applyConstraints({
                    advanced: [{ zoom: safeValue }]
                }).catch(err => console.error("ズーム適用エラー:", err));
                
                updateZoomUI();
            }
        }

        function updateZoomUI() {
            if (zoomCapabilities) {
                zoomInfo.innerText = `現在のズーム倍率値: ${currentZoom.toFixed(1)} (範囲: ${zoomCapabilities.min} 〜 ${zoomCapabilities.max})`;
            }
        }

        // ズームボタンのイベント設定
        zoomInBtn.addEventListener('click', () => {
            if (zoomCapabilities) applyZoom(currentZoom + 0.3); // 0.3ずつズームイン
        });

        zoomOutBtn.addEventListener('click', () => {
            if (zoomCapabilities) applyZoom(currentZoom - 0.3); // 0.3ずつズームアウト
        });

        // 音声案内関数
        function speakGuide(text) {
            const now = Date.now();
            if (now - lastSpokenTime > 4000) { // 4秒の間隔
                const uttr = new SpeechSynthesisUtterance(text);
                uttr.lang = 'ja-JP';
                window.speechSynthesis.speak(uttr);
                lastSpokenTime = now;
            }
        }

        function processVideo() {
            if (!isProcessing) return;

            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imgData.data;
            let greenPixels = [];

            // 蛍光緑の検出
            for (let i = 0; i < data.length; i += 16) {
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];
                if (g > 140 && r < 100 && b < 100) {
                    const pixelIndex = i / 4;
                    const x = pixelIndex % canvas.width;
                    const y = Math.floor(pixelIndex / canvas.width);
                    greenPixels.push({x, y});
                }
            }

            let clusters = [];
            greenPixels.forEach(p => {
                let foundCluster = false;
                for (let c of clusters) {
                    if (Math.abs(c.x - p.x) < 40 && Math.abs(c.y - p.y) < 40) {
                        c.xs.push(p.x); c.ys.push(p.y);
                        c.x = (c.x + p.x) / 2; c.y = (c.y + p.y) / 2;
                        foundCluster = true; break;
                    }
                }
                if (!foundCluster) clusters.push({ x: p.x, y: p.y, xs: [p.x], ys: [p.y] });
            });

            const validClusters = clusters.filter(c => c.xs.length > 5);

            validClusters.forEach(c => {
                const minX = Math.min(...c.xs); const maxX = Math.max(...c.xs);
                const minY = Math.min(...c.ys); const maxY = Math.max(...c.ys);
                ctx.strokeStyle = '#ff007f';
                ctx.lineWidth = 4;
                ctx.strokeRect(minX - 5, minY - 5, (maxX - minX) + 10, (maxY - minY) + 10);
            });

            // マーク数による判定
            const markCount = validClusters.length;
            if (markCount === 4) {
                statusText.innerHTML = `<span style="color: #34c759;">4つの点をすべて確認しました！</span>`;
            } else if (markCount < 4) {
                statusText.innerHTML = `<span style="color: #ffcc00;">マークが足りません (${markCount} / 4)</span>`;
                speakGuide("もっと引きで撮影するか、ズームアウトしてください。");
            } else {
                statusText.innerHTML = `<span style="color: #ff3b30;">マークが多すぎます (${markCount}個)</span>`;
                speakGuide("画面を微調整してください。");
            }

            requestAnimationFrame(processVideo);
        }
    </script>
</body>
</html>
