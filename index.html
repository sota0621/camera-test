<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赤色マーカー検出（軽量版）</title>
    <style>
        body {
            margin: 0;
            background-color: #111;
            font-family: sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            position: relative;
            width: 90%;
            max-width: 640px;
        }
        video {
            display: none;
        }
        canvas {
            width: 100%;
            height: auto;
            border: 2px solid #ff3b30;
            border-radius: 8px;
            display: block;
        }
        button {
            margin: 20px;
            padding: 15px 30px;
            font-size: 18px;
            background-color: #ff3b30;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        #status {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div id="status">ボタンを押してカメラを起動してください</div>
    
    <div class="container">
        <video id="camera-view" autoplay playsinline muted></video>
        <canvas id="canvas-output"></canvas>
    </div>

    <button id="start-btn">カメラ起動</button>

    <script>
        const video = document.getElementById('camera-view');
        const canvas = document.getElementById('canvas-output');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const startBtn = document.getElementById('start-btn');
        const statusText = document.getElementById('status');

        // 固定しきい値（標準的な赤色検出設定）
        const MIN_R = 120;
        const RATIO = 1.4;

        startBtn.addEventListener('click', async () => {
            statusText.innerText = "カメラを起動中...";
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: false,
                    video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 480 } }
                });
                video.srcObject = stream;
                video.play();
                startBtn.style.display = 'none';
                
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    statusText.innerText = "赤色のマーカーを4つ映してください";
                    requestAnimationFrame(processVideo);
                };
            } catch (error) {
                statusText.innerText = "起動失敗: " + error.message;
            }
        });

        function processVideo() {
            // 1. カメラ映像をCanvasに描画
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // 2. ピクセルデータを取得
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imgData.data;

            const redPixels = [];
            const distanceThreshold = Math.round(canvas.width * 0.08);

            // 3. 赤色ピクセルの抽出（16バイト＝4ピクセル飛ばしで高速走査）
            for (let i = 0; i < data.length; i += 16) {
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];

                if (r > MIN_R && r > g * RATIO && r > b * RATIO) {
                    const pixelIndex = i / 4;
                    redPixels.push({
                        x: pixelIndex % canvas.width,
                        y: Math.floor(pixelIndex / canvas.width)
                    });
                }
            }

            // 4. 近しいピクセルをまとめて塊（クラスター）にする処理
            const clusters = [];
            redPixels.forEach(p => {
                let foundCluster = false;
                for (let c of clusters) {
                    if (Math.abs(c.x - p.x) < distanceThreshold && Math.abs(c.y - p.y) < distanceThreshold) {
                        c.xs.push(p.x); 
                        c.ys.push(p.y);
                        c.x = c.xs.reduce((sum, val) => sum + val, 0) / c.xs.length;
                        c.y = c.ys.reduce((sum, val) => sum + val, 0) / c.ys.length;
                        foundCluster = true; 
                        break;
                    }
                }
                if (!foundCluster) clusters.push({ x: p.x, y: p.y, xs: [p.x], ys: [p.y] });
            });

            // ノイズ除去（あまりに小さい塊は無視）
            const minPixelsPerMark = Math.round(canvas.width * 0.005);
            const validClusters = clusters.filter(c => c.xs.length > minPixelsPerMark);
            
            // 5. 4つの塊が検出された場合のみ、四角い枠線を引く
            if (validClusters.length === 4) {
                // 上下の判定（Y座標でソート）
                validClusters.sort((a, b) => a.y - b.y);
                const topTwo = [validClusters[0], validClusters[1]].sort((a, b) => a.x - b.x);
                const bottomTwo = [validClusters[2], validClusters[3]].sort((a, b) => a.x - b.x);
                
                // 時計回りの順序（左上 -> 右上 -> 右下 -> 左下）
                const pts = [topTwo[0], topTwo[1], bottomTwo[1], bottomTwo[0]];

                // 四角形を描画
                ctx.strokeStyle = '#ff3b30';
                ctx.lineWidth = 5;
                ctx.beginPath();
                ctx.moveTo(pts[0].x, pts[0].y);
                ctx.lineTo(pts[1].x, pts[1].y);
                ctx.lineTo(pts[2].x, pts[2].y);
                ctx.lineTo(pts[3].x, pts[3].y);
                ctx.closePath();
                ctx.stroke();

                statusText.innerHTML = `<span style="color: #34c759;">🟢 4点認識完了（ターゲットをロックしました）</span>`;
            } else {
                statusText.innerHTML = `🔴 検出数: ${validClusters.length} / 4 (赤色の塊を4つ認識させてください)`;
            }

            requestAnimationFrame(processVideo);
        }
    </script>
</body>
</html>
