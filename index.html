<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黄緑色マーカー検出（iPhone長時間録画・リアルタイムプレビュー版）</title>
    <style>
        body {
            margin: 0;
            background-color: #111;
            font-family: sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            position: relative;
            width: 90%;
            max-width: 720px;
        }
        video {
            display: none;
        }
        canvas {
            width: 100%;
            height: auto;
            border: 2px solid #555;
            border-radius: 8px;
            display: block;
            transition: border-color 0.3s;
        }
        canvas.locked {
            border-color: #34c759;
            box-shadow: 0 0 15px rgba(52, 199, 89, 0.5);
        }
        .btn-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin: 20px;
        }
        .btn {
            padding: 15px 30px;
            font-size: 18px;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            width: 280px;
            text-align: center;
        }
        #start-btn {
            background-color: #007aff;
        }
        #start-btn:disabled {
            background-color: #555;
            cursor: not-allowed;
        }
        #stop-record-btn {
            background-color: #ff3b30;
            display: none;
        }
        #status {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
            text-align: center;
            min-height: 24px;
            padding: 0 10px;
        }
    </style>
    <script async src="https://docs.opencv.org/4.x/opencv.js" id="opencv-src"></script>
</head>
<body>

    <div id="status">OpenCV.jsを読み込んでいます...</div>
    
    <div class="container">
        <video id="camera-view" autoplay playsinline muted></video>
        <canvas id="canvas-output"></canvas>
    </div>

    <div class="btn-container">
        <button id="start-btn" class="btn" disabled>システム開始</button>
        <button id="stop-record-btn" class="btn">⏹ 録画を停止して終了</button>
    </div>

    <script>
        const video = document.getElementById('camera-view');
        const canvas = document.getElementById('canvas-output');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const stopRecordBtn = document.getElementById('stop-record-btn');
        const statusText = document.getElementById('status');

        let src, dst, hsv, mask, contours, hierarchy;
        let isProcessing = false;
        
        let lockCounter = 0;
        const REQUIRED_FRAMES = 150; // 5秒間安定

        // 録画用・カメラストリーム用の変数
        let mediaRecorder;
        let isRecording = false;
        let canvasStream = null;
        let cameraStream = null;
        let fileIndex = 1;
        let animationFrameId = null;
        
        const CHUNK_INTERVAL = 180000; // 3分ごとに自動排出

        document.getElementById('opencv-src').addEventListener('load', () => {
            statusText.innerText = "準備完了！ボタンを押してスキャンを開始してください";
            startBtn.disabled = false;
        });

        startBtn.addEventListener('click', async () => {
            statusText.innerText = "広角スキャン用カメラを探索中...";
            try {
                const initStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                initStream.getTracks().forEach(track => track.stop());

                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(device => device.kind === 'videoinput');

                let targetDeviceId = null;
                const wideDevice = videoDevices.find(d => {
                    const label = d.label.toLowerCase();
                    return label.includes('ultra') || label.includes('wide') || label.includes('0.5') || label.includes('超広角');
                });

                if (wideDevice) targetDeviceId = wideDevice.deviceId;
                else if (videoDevices.length > 1) targetDeviceId = videoDevices[videoDevices.length - 1].deviceId;

                const constraints = {
                    audio: false,
                    video: { width: { ideal: 1280 }, height: { ideal: 720 } }
                };
                if (targetDeviceId) constraints.video.deviceId = { exact: targetDeviceId };
                else constraints.video.facingMode = 'environment';

                cameraStream = await navigator.mediaDevices.getUserMedia(constraints);
                const videoTrack = cameraStream.getVideoTracks()[0];
                const capabilities = videoTrack.getCapabilities ? videoTrack.getCapabilities() : {};
                
                if (capabilities.zoom) {
                    try { await videoTrack.applyConstraints({ advanced: [{ zoom: capabilities.zoom.min }] }); }
                    catch (e) { console.warn(e); }
                }

                video.srcObject = cameraStream;
                video.play();
                startBtn.style.display = 'none';
                
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    
                    src = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC4);
                    dst = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC4);
                    hsv = new cv.Mat(); mask = new cv.Mat();
                    contours = new cv.MatVector(); hierarchy = new cv.Mat();

                    canvasStream = canvas.captureStream(30);
                    isProcessing = true;
                    statusText.innerText = "黄緑の丸4つを画面内に収めてください";
                    animationFrameId = requestAnimationFrame(processVideo);
                };
            } catch (error) {
                statusText.innerText = "カメラ起動失敗: " + error.message;
            }
        });

        function startRecordingSystem() {
            let options = { mimeType: 'video/mp4; codecs=avc1' };
            if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                options = { mimeType: 'video/webm; codecs=vp9' };
            }
            if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                options = { mimeType: '' }; 
            }

            mediaRecorder = new MediaRecorder(canvasStream, options);
            fileIndex = 1;

            mediaRecorder.ondataavailable = (event) => {
                if (event.data && event.data.size > 0) {
                    triggerSecureDownload(event.data);
                }
            };

            mediaRecorder.start(CHUNK_INTERVAL);
            isRecording = true;
            stopRecordBtn.style.display = 'block';
        }

        function triggerSecureDownload(blobData) {
            const ext = (mediaRecorder.mimeType && mediaRecorder.mimeType.includes('webm')) ? 'webm' : 'mp4';
            const url = URL.createObjectURL(blobData);
            
            const a = document.createElement('a');
            a.href = url;
            const nowTime = new Date().toISOString().replace(/[:.]/g, '-');
            a.download = `experiment-part${fileIndex}-${nowTime}.${ext}`;
            
            document.body.appendChild(a);
            
            const clickEvent = new MouseEvent('click', {
                view: window,
                bubbles: true,
                cancelable: true
            });
            a.dispatchEvent(clickEvent);
            
            document.body.removeChild(a);
            
            setTimeout(() => {
                URL.revokeObjectURL(url);
            }, 1000);

            statusText.innerHTML = `<span style="color: #34c759;">🎬 動画パート ${fileIndex} を自動保存しました</span>`;
            fileIndex++;
        }

        stopRecordBtn.addEventListener('click', () => {
            if (isRecording) {
                isRecording = false;
                isProcessing = false;
                stopRecordBtn.style.display = 'none';
                canvas.classList.remove('locked');
                lockCounter = 0;
                
                if (animationFrameId) {
                    cancelAnimationFrame(animationFrameId);
                }

                if (mediaRecorder && mediaRecorder.state === "recording") {
                    mediaRecorder.stop(); 
                }

                if (cameraStream) {
                    cameraStream.getTracks().forEach(track => track.stop());
                }
                if (video) {
                    video.srcObject = null;
                }

                ctx.fillStyle = "#222";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                statusText.innerHTML = `<span style="color: #34c759; font-size: 18px;">■ 録画を安全に終了しました。<br>「ファイル」アプリの「ダウンロード」を確認してください。</span>`;
            }
        });

        function processVideo() {
            if (!isProcessing) return;

            // ★超重要：録画中であっても、カメラのリアルタイム映像はCanvasへ常に描画（更新）し続ける
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            if (!isRecording) {
                // 録画が始まる前（スキャン中）だけ、重たいOpenCVの解析処理を動かす
                src.data.set(ctx.getImageData(0, 0, canvas.width, canvas.height).data);
                cv.GaussianBlur(src, dst, new cv.Size(5, 5), 0, 0, cv.BORDER_DEFAULT);
                cv.cvtColor(dst, hsv, cv.COLOR_RGBA2RGB);
                cv.cvtColor(hsv, hsv, cv.COLOR_RGB2HSV);

                let low = cv.matFromArray(3, 1, cv.CV_8U, [35, 60, 50]);
                let high = cv.matFromArray(3, 1, cv.CV_8U, [85, 255, 255]);
                cv.inRange(hsv, low, high, mask);
                low.delete(); high.delete();

                cv.findContours(mask, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);
                let validCenters = [];

                for (let i = 0; i < contours.size(); ++i) {
                    let cnt = contours.get(i);
                    let area = cv.contourArea(cnt);
                    if (area > 20) {
                        let perimeter = cv.arcLength(cnt, true);
                        if (perimeter > 0) {
                            let circularity = (4 * Math.PI * area) / (perimeter * perimeter);
                            if (circularity > 0.65) { 
                                let M = cv.moments(cnt);
                                if (M.m00 !== 0) validCenters.push({ x: M.m10 / M.m00, y: M.m01 / M.m00 });
                            }
                        }
                    }
                    cnt.delete();
                }

                if (validCenters.length === 4) {
                    lockCounter++;
                    validCenters.sort((a, b) => a.y - b.y);
                    let topTwo = [validCenters[0], validCenters[1]].sort((a, b) => a.x - b.x);
                    let bottomTwo = [validCenters[2], validCenters[3]].sort((a, b) => a.x - b.x);
                    const pts = [topTwo[0], topTwo[1], bottomTwo[1], bottomTwo[0]];

                    ctx.strokeStyle = '#34c759'; ctx.lineWidth = 5;
                    ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y);
                    ctx.lineTo(pts[1].x, pts[1].y); ctx.lineTo(pts[2].x, pts[2].y);
                    ctx.lineTo(pts[3].x, pts[3].y); ctx.closePath(); ctx.stroke();

                    if (lockCounter >= REQUIRED_FRAMES) {
                        // ロック確定。OpenCV用の一時メモリだけを解放して解析を抜ける
                        src.delete(); dst.delete(); hsv.delete(); mask.delete(); contours.delete(); hierarchy.delete();
                        
                        canvas.classList.add('locked');
                        startRecordingSystem();
                        // ここでreturnしてループを壊さず、次のフレームへ処理を継続させる
                    } else {
                        let timeLeft = Math.ceil((REQUIRED_FRAMES - lockCounter) / 30);
                        statusText.innerHTML = `🟡 4点捕捉中... 画角安定まであと <span style="color: #ffcc00; font-size: 20px;">${timeLeft}</span> 秒`;
                    }
                } else {
                    lockCounter = 0;
                    canvas.classList.remove('locked');
                    statusText.innerHTML = `🔍 マーカーを探しています... (${validCenters.length} / 4)`;
                    ctx.fillStyle = 'red';
                    for(let p of validCenters) {
                        ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, 2 * Math.PI); ctx.fill();
                    }
                }
            } else {
                // 録画中：OpenCVは動かさないが、一番上の「ctx.drawImage」が毎フレーム走り、最新の映像が映り続ける
                statusText.innerHTML = `<span style="color: #ff3b30;">🔴 長時間実験映像を録画中...（3分ごとにpart1, part2...として自動で『ファイル』アプリへダウンロード保存されます）</span>`;
            }

            if (isProcessing) {
                animationFrameId = requestAnimationFrame(processVideo);
            }
        }
    </script>
</body>
</html>
