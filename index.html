<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黄緑色マーカー検出（iPhone完全放置・長時間録画対応版）</title>
    <style>
        body {
            margin: 0;
            background-color: #111;
            font-family: sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            position: relative;
            width: 90%;
            max-width: 720px;
        }
        video {
            display: none;
        }
        canvas {
            width: 100%;
            height: auto;
            border: 2px solid #555;
            border-radius: 8px;
            display: block;
            transition: border-color 0.3s;
        }
        canvas.locked {
            border-color: #34c759;
            box-shadow: 0 0 15px rgba(52, 199, 89, 0.5);
        }
        .btn-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin: 20px;
        }
        .btn {
            padding: 15px 30px;
            font-size: 18px;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            width: 280px;
            text-align: center;
        }
        #start-btn {
            background-color: #007aff;
        }
        #start-btn:disabled {
            background-color: #555;
            cursor: not-allowed;
        }
        #stop-record-btn {
            background-color: #ff3b30;
            display: none;
        }
        #status {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
            text-align: center;
            min-height: 24px;
            padding: 0 10px;
        }
    </style>
    <script async src="https://docs.opencv.org/4.x/opencv.js" id="opencv-src"></script>
</head>
<body>

    <div id="status">OpenCV.jsを読み込んでいます...</div>
    
    <div class="container">
        <video id="camera-view" autoplay playsinline muted></video>
        <canvas id="canvas-output"></canvas>
    </div>

    <div class="btn-container">
        <button id="start-btn" class="btn" disabled>システム開始</button>
        <button id="stop-record-btn" class="btn">⏹ 録画を停止して保存</button>
    </div>

    <script>
        const video = document.getElementById('camera-view');
        const canvas = document.getElementById('canvas-output');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const stopRecordBtn = document.getElementById('stop-record-btn');
        const statusText = document.getElementById('status');

        let src, dst, hsv, mask, contours, hierarchy;
        let isProcessing = false;
        
        let lockCounter = 0;
        const REQUIRED_FRAMES = 150; // 5秒間安定 (30fps換算)

        // 録画・データベース用の変数
        let mediaRecorder;
        let isRecording = false;
        let db = null;
        let chunkCount = 0;
        const CHUNK_INTERVAL = 60000; // 1分ごとにスマホ内蔵ストレージ（DB）へ退避してメモリを解放

        // IndexedDB（スマホ内の大容量保存エリア）の初期化
        function initDatabase() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open("VideoRecorderDB", 1);
                request.onupgradeneeded = (e) => {
                    const database = e.target.result;
                    if (!database.objectStoreNames.contains("video_chunks")) {
                        database.createObjectStore("video_chunks", { autoIncrement: true });
                    }
                };
                request.onsuccess = (e) => {
                    db = e.target.result;
                    resolve();
                };
                request.onerror = (e) => reject(e);
            });
        }

        // 録画データの断片（チャンク）をDBに保存する関数
        function saveChunkToDB(blob) {
            if (!db) return;
            const transaction = db.transaction(["video_chunks"], "readwrite");
            const store = transaction.objectStore("video_chunks");
            store.add(blob);
            chunkCount++;
        }

        // DBに溜まった全データを消去（撮影開始時に呼ぶ）
        function clearDatabase() {
            return new Promise((resolve) => {
                const transaction = db.transaction(["video_chunks"], "readwrite");
                const store = transaction.objectStore("video_chunks");
                const request = store.clear();
                request.onsuccess = () => {
                    chunkCount = 0;
                    resolve();
                };
            });
        }

        document.getElementById('opencv-src').addEventListener('load', async () => {
            try {
                await initDatabase();
                statusText.innerText = "準備完了！ボタンを押してスキャンを開始してください";
                startBtn.disabled = false;
            } catch (e) {
                statusText.innerText = "データベースの初期化に失敗しました";
            }
        });

        startBtn.addEventListener('click', async () => {
            statusText.innerText = "広角スキャン用カメラを探索中...";
            try {
                const initStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                initStream.getTracks().forEach(track => track.stop());

                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(device => device.kind === 'videoinput');

                let targetDeviceId = null;
                const wideDevice = videoDevices.find(d => {
                    const label = d.label.toLowerCase();
                    return label.includes('ultra') || label.includes('wide') || label.includes('0.5') || label.includes('超広角');
                });

                if (wideDevice) {
                    targetDeviceId = wideDevice.deviceId;
                } else if (videoDevices.length > 1) {
                    targetDeviceId = videoDevices[videoDevices.length - 1].deviceId;
                }

                const constraints = {
                    audio: false,
                    video: {
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                };

                if (targetDeviceId) {
                    constraints.video.deviceId = { exact: targetDeviceId };
                } else {
                    constraints.video.facingMode = 'environment';
                }

                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                
                const videoTrack = stream.getVideoTracks()[0];
                const capabilities = videoTrack.getCapabilities ? videoTrack.getCapabilities() : {};
                
                if (capabilities.zoom) {
                    try {
                        await videoTrack.applyConstraints({
                            advanced: [{ zoom: capabilities.zoom.min }]
                        });
                    } catch (e) {
                        console.warn("ズーム倍率の設定に失敗: ", e);
                    }
                }

                video.srcObject = stream;
                video.play();
                startBtn.style.display = 'none';
                
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    
                    src = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC4);
                    dst = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC4);
                    hsv = new cv.Mat();
                    mask = new cv.Mat();
                    contours = new cv.MatVector();
                    hierarchy = new cv.Mat();

                    const canvasStream = canvas.captureStream(30);
                    
                    let options = { mimeType: 'video/mp4; codecs=avc1' };
                    if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                        options = { mimeType: 'video/webm; codecs=vp9' };
                    }
                    if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                        options = { mimeType: '' }; 
                    }

                    mediaRecorder = new MediaRecorder(canvasStream, options);
                    
                    // 1分ごとにデータが届き、スマホ内蔵ストレージに自動保存（ポップアップは一切出ません）
                    mediaRecorder.ondataavailable = (event) => {
                        if (event.data && event.data.size > 0) {
                            saveChunkToDB(event.data);
                        }
                    };

                    // 録画停止ボタンが押されたら、DBからデータを全部繋げて1本の動画としてダウンロードさせる
                    mediaRecorder.onstop = () => {
                        statusText.innerText = "動画ファイルを構築中...（数秒かかります）";
                        
                        const transaction = db.transaction(["video_chunks"], "readonly");
                        const store = transaction.objectStore("video_chunks");
                        const request = store.getAll();
                        
                        request.onsuccess = () => {
                            const allChunks = request.result;
                            if (allChunks.length === 0) {
                                statusText.innerText = "録画データがありませんでした。";
                                return;
                            }
                            
                            const finalBlob = new Blob(allChunks, { type: mediaRecorder.mimeType || 'video/mp4' });
                            const ext = mediaRecorder.mimeType.includes('webm') ? 'webm' : 'mp4';
                            const url = URL.createObjectURL(finalBlob);
                            
                            const a = document.createElement('a');
                            a.href = url;
                            const nowTime = new Date().toISOString().replace(/[:.]/g, '-');
                            a.download = `experiment-video-${nowTime}.${ext}`;
                            document.body.appendChild(a);
                            a.click();
                            document.body.removeChild(a);
                            URL.revokeObjectURL(url);
                            
                            statusText.innerHTML = `<span style="color: #34c759;">🎬 1本の動画として無事に保存されました！</span>`;
                        };
                    };

                    isProcessing = true;
                    statusText.innerText = "黄緑の丸4つを画面内に収めてください";
                    requestAnimationFrame(processVideo);
                };
            } catch (error) {
                statusText.innerText = "カメラ起動失敗: " + error.message;
            }
        });

        stopRecordBtn.addEventListener('click', () => {
            if (isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                stopRecordBtn.style.display = 'none';
                canvas.classList.remove('locked');
                lockCounter = 0; 
            }
        });

        function processVideo() {
            if (!isProcessing) return;

            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            if (!isRecording) {
                src.data.set(ctx.getImageData(0, 0, canvas.width, canvas.height).data);

                cv.GaussianBlur(src, dst, new cv.Size(5, 5), 0, 0, cv.BORDER_DEFAULT);
                cv.cvtColor(dst, hsv, cv.COLOR_RGBA2RGB);
                cv.cvtColor(hsv, hsv, cv.COLOR_RGB2HSV);

                let low = cv.matFromArray(3, 1, cv.CV_8U, [35, 60, 50]);
                let high = cv.matFromArray(3, 1, cv.CV_8U, [85, 255, 255]);
                cv.inRange(hsv, low, high, mask);
                low.delete(); high.delete();

                cv.findContours(mask, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

                let validCenters = [];

                for (let i = 0; i < contours.size(); ++i) {
                    let cnt = contours.get(i);
                    let area = cv.contourArea(cnt);

                    if (area > 20) {
                        let perimeter = cv.arcLength(cnt, true);
                        if (perimeter > 0) {
                            let circularity = (4 * Math.PI * area) / (perimeter * perimeter);
                            if (circularity > 0.65) { 
                                let M = cv.moments(cnt);
                                if (M.m00 !== 0) {
                                    validCenters.push({ x: M.m10 / M.m00, y: M.m01 / M.m00 });
                                }
                            }
                        }
                    }
                    cnt.delete();
                }

                if (validCenters.length === 4) {
                    lockCounter++;

                    validCenters.sort((a, b) => a.y - b.y);
                    let topTwo = [validCenters[0], validCenters[1]].sort((a, b) => a.x - b.x);
                    let bottomTwo = [validCenters[2], validCenters[3]].sort((a, b) => a.x - b.x);
                    const pts = [topTwo[0], topTwo[1], bottomTwo[1], bottomTwo[0]];

                    ctx.strokeStyle = '#34c759';
                    ctx.lineWidth = 5;
                    ctx.beginPath();
                    ctx.moveTo(pts[0].x, pts[0].y);
                    ctx.lineTo(pts[1].x, pts[1].y);
                    ctx.lineTo(pts[2].x, pts[2].y);
                    ctx.lineTo(pts[3].x, pts[3].y);
                    ctx.closePath();
                    ctx.stroke();

                    if (lockCounter >= REQUIRED_FRAMES) {
                        // ロック確定時、過去の古い一時データをクリアしてから録画開始
                        clearDatabase().then(() => {
                            canvas.classList.add('locked');
                            mediaRecorder.start(CHUNK_INTERVAL); // 1分ごとに内蔵ストレージ（DB）へ排出
                            isRecording = true;
                            stopRecordBtn.style.display = 'block';
                        });
                    } else {
                        let timeLeft = Math.ceil((REQUIRED_FRAMES - lockCounter) / 30);
                        statusText.innerHTML = `🟡 4点捕捉中... 画角安定まであと <span style="color: #ffcc00; font-size: 20px;">${timeLeft}</span> 秒`;
                    }
                } else {
                    lockCounter = 0;
                    canvas.classList.remove('locked');
                    statusText.innerHTML = `🔍 マーカーを探しています... (${validCenters.length} / 4)`;
                    
                    ctx.fillStyle = 'red';
                    for(let p of validCenters) {
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, 5, 0, 2 * Math.PI);
                        ctx.fill();
                    }
                }
            } else {
                // 録画中：完全にほったらかしでOK
                statusText.innerHTML = `<span style="color: #ff3b30;">🔴 実験映像を長時間録画中...（自動でバックグラウンド保存されています。途中で触る必要はありません）</span>`;
            }

            requestAnimationFrame(processVideo);
        }
    </script>
</body>
</html>
