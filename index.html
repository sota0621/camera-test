<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QRコード4点検出（日本語対応）</title>
    <style>
        body {
            margin: 0;
            background-color: #111;
            font-family: sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            position: relative;
            width: 90%;
            max-width: 640px;
        }
        video {
            display: none;
        }
        canvas {
            width: 100%;
            height: auto;
            border: 2px solid #555;
            border-radius: 8px;
            display: block;
            transition: border-color 0.3s;
        }
        canvas.locked {
            border-color: #34c759;
            box-shadow: 0 0 15px rgba(52, 199, 89, 0.5);
        }
        .btn {
            margin: 20px;
            padding: 15px 30px;
            font-size: 18px;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        #start-btn {
            background-color: #007aff;
        }
        #start-btn:disabled {
            background-color: #555;
            cursor: not-allowed;
        }
        #shoot-btn {
            background-color: #34c759;
            display: none;
            animation: pulse 1.5s infinite;
        }
        #shoot-btn:active {
            transform: scale(0.95);
        }
        #status {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
            text-align: center;
            min-height: 24px;
        }
        #camera-trigger {
            display: none;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(52, 199, 89, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(52, 199, 89, 0); }
            100% { box-shadow: 0 0 0 0 rgba(52, 199, 89, 0); }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
</head>
<body>

    <div id="status">システムを読み込んでいます...</div>
    
    <div class="container">
        <video id="camera-view" autoplay playsinline muted></video>
        <canvas id="canvas-output"></canvas>
    </div>

    <button id="start-btn" class="btn">システム開始</button>
    <button id="shoot-btn" class="btn">📸 撮影開始できます</button>

    <input type="file" id="camera-trigger" accept="image/*" capture="environment">

    <script>
        const video = document.getElementById('camera-view');
        const canvas = document.getElementById('canvas-output');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const shootBtn = document.getElementById('shoot-btn');
        const statusText = document.getElementById('status');
        const cameraTrigger = document.getElementById('camera-trigger');

        let isProcessing = false;
        let lockCounter = 0;
        const REQUIRED_FRAMES = 10; // 約0.3秒間安定したらロック

        // 日本語のキーに変更
        let qrPositions = { '左上': null, '右上': null, '左下': null, '右下': null };

        statusText.innerText = "準備完了！ボタンを押してスキャンを開始してください";

        startBtn.addEventListener('click', async () => {
            statusText.innerText = "iPhoneの広角スキャン用カメラを探索中...";
            try {
                const initStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                initStream.getTracks().forEach(track => track.stop());

                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(device => device.kind === 'videoinput');

                let targetDeviceId = null;
                const wideDevice = videoDevices.find(d => {
                    const label = d.label.toLowerCase();
                    return label.includes('ultra') || label.includes('wide') || label.includes('0.5') || label.includes('超広角');
                });

                if (wideDevice) {
                    targetDeviceId = wideDevice.deviceId;
                } else if (videoDevices.length > 1) {
                    targetDeviceId = videoDevices[videoDevices.length - 1].deviceId;
                }

                const constraints = {
                    audio: false,
                    video: {
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                };

                if (targetDeviceId) {
                    constraints.video.deviceId = { exact: targetDeviceId };
                } else {
                    constraints.video.facingMode = 'environment';
                }

                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                
                const videoTrack = stream.getVideoTracks()[0];
                const capabilities = videoTrack.getCapabilities ? videoTrack.getCapabilities() : {};
                
                if (capabilities.zoom) {
                    try {
                        await videoTrack.applyConstraints({
                            advanced: [{ zoom: capabilities.zoom.min }]
                        });
                    } catch (e) {
                        console.warn("ズーム設定失敗: ", e);
                    }
                }

                video.srcObject = stream;
                video.play();
                startBtn.style.display = 'none';
                
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    isProcessing = true;
                    statusText.innerText = "4つのQRコード（左上, 右上, 左下, 右下）を配置してください";
                    requestAnimationFrame(processVideo);
                };
            } catch (error) {
                statusText.innerText = "カメラ起動失敗: " + error.message;
            }
        });

        shootBtn.addEventListener('click', () => {
            isProcessing = false; 
            cameraTrigger.click(); 
        });

        cameraTrigger.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                statusText.innerHTML = `<span style="color: #34c759;">🎉 写真の取り込みに成功しました！</span>`;
            }
            lockCounter = 0;
            shootBtn.style.display = 'none';
            canvas.classList.remove('locked');
            isProcessing = true;
            requestAnimationFrame(processVideo);
        });

        function processVideo() {
            if (!isProcessing) return;

            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            
            // jsQRでQRコードをスキャン
            const code = jsQR(imageData.data, imageData.width, imageData.height, {
                inversionAttempts: "dontInvert",
            });

            if (code) {
                // 前後の不要な空白を削除
                const txt = code.data.trim();
                
                // 読み取ったテキストが日本語の指定位置に一致するか判定
                if (['左上', '右上', '左下', '右下'].includes(txt)) {
                    const loc = code.location;
                    const centerX = (loc.topLeftCorner.x + loc.topRightCorner.x + loc.bottomRightCorner.x + loc.bottomLeftCorner.x) / 4;
                    const centerY = (loc.topLeftCorner.y + loc.topRightCorner.y + loc.bottomRightCorner.y + loc.bottomLeftCorner.y) / 4;
                    
                    qrPositions[txt] = { x: centerX, y: centerY, timestamp: Date.now() };
                }
            }

            let activeCount = 0;
            const now = Date.now();
            
            for (let key in qrPositions) {
                let pos = qrPositions[key];
                // 1.5秒以上古いデータは見失ったと判定
                if (pos && (now - pos.timestamp < 1500)) {
                    activeCount++;
                    
                    // 検出点に青いピンを描画
                    ctx.fillStyle = '#007aff';
                    ctx.beginPath();
                    ctx.arc(pos.x, pos.y, 8, 0, 2 * Math.PI);
                    ctx.fill();
                    
                    // 画面に「右上」などのラベルを表示
                    ctx.fillStyle = 'white';
                    ctx.font = 'bold 16px sans-serif';
                    ctx.fillText(key, pos.x + 12, pos.y + 6);
                } else {
                    qrPositions[key] = null;
                }
            }

            // 4つすべて揃った場合
            if (activeCount === 4) {
                lockCounter++;

                // 4点を結ぶ枠線を描画
                ctx.strokeStyle = '#34c759';
                ctx.lineWidth = 5;
                ctx.beginPath();
                ctx.moveTo(qrPositions['左上'].x, qrPositions['左上'].y);
                ctx.lineTo(qrPositions['右上'].x, qrPositions['右上'].y);
                ctx.lineTo(qrPositions['右下'].x, qrPositions['右下'].y);
                ctx.lineTo(qrPositions['左下'].x, qrPositions['左下'].y);
                ctx.closePath();
                ctx.stroke();

                if (lockCounter >= REQUIRED_FRAMES) {
                    canvas.classList.add('locked');
                    shootBtn.style.display = 'block';
                    statusText.innerHTML = `<span style="color: #34c759;">🟢 すべてのQRコードをロックしました。撮影可能です</span>`;
                } else {
                    statusText.innerHTML = `🟡 領域を固定中...`;
                }
            } else {
                lockCounter = 0;
                shootBtn.style.display = 'none';
                canvas.classList.remove('locked');
                
                let missing = [];
                for(let key in qrPositions) {
                    if(!qrPositions[key]) missing.push(key);
                }
                statusText.innerHTML = `🔍 QRコードを探しています... 不足: [ ${missing.join(', ')} ]`;
            }

            requestAnimationFrame(processVideo);
        }
    </script>
</body>
</html>
